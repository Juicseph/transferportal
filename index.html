<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster GM Command Center</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f6f8fc;color:#111827;font-family:Arial,Helvetica,sans-serif}.app{display:flex;min-height:100vh}.side{width:220px;background:#071423;color:white;padding:20px;flex-shrink:0}.brand{font-size:20px;font-weight:900;margin-bottom:22px}.brand small{display:block;font-size:11px;color:#93c5fd;text-transform:uppercase;margin-top:4px}.nav{padding:12px;border-radius:10px;margin:6px 0;color:#cbd5e1;cursor:pointer;font-weight:700}.nav.active,.nav:hover{background:#14304a;color:white}.main{padding:22px;width:100%;min-width:0}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}.eyebrow{font-size:12px;color:#64748b;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.title{font-size:30px;font-weight:900;margin:4px 0}.sub{color:#64748b;margin:0}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;background:#1769ff;color:white;padding:10px 14px;border-radius:10px;font-weight:800;cursor:pointer}.btn.secondary{background:white;color:#111827;border:1px solid #e5e7eb}.btn.danger{background:#dc2626}.btn.small{padding:7px 10px;font-size:12px}.sport{display:flex;background:#eaf0f8;border:1px solid #e5e7eb;border-radius:12px;padding:4px}.sport button{border:0;background:transparent;padding:8px 11px;border-radius:9px;font-weight:800;color:#64748b}.sport button.active{background:white;color:#111827}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:15px;box-shadow:0 8px 24px rgba(15,23,42,.06)}.kpi label{display:block;color:#64748b;font-size:11px;text-transform:uppercase;font-weight:900}.kpi b{display:block;font-size:22px;margin-top:7px}.kpi small{color:#64748b}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid #e5e7eb;background:white;border-radius:999px;padding:8px 12px;font-weight:800;color:#64748b;cursor:pointer}.tab.active{background:#071423;color:white}.toolbar{display:grid;grid-template-columns:1fr 150px 150px 150px auto;gap:10px;margin-bottom:14px}.field{height:42px;border:1px solid #e5e7eb;border-radius:10px;background:white;padding:0 11px;color:#111827;width:100%}.content{display:grid;grid-template-columns:1.7fr .9fr;gap:14px}.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.panel-head h3{margin:0}.table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:12px}table{width:100%;border-collapse:collapse;background:white;font-size:13px}th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left;white-space:nowrap}th{background:#f8fafc;color:#64748b;font-size:11px;text-transform:uppercase}.num{text-align:right}tr{cursor:pointer}tr:hover td{background:#f8fbff}.pill{display:inline-block;border-radius:999px;padding:4px 8px;background:#f1f5f9;font-size:11px;font-weight:800}.vb{background:#f3e8ff;color:#6d28d9}.bb{background:#ffedd5;color:#c2410c}.active-pill{background:#dcfce7;color:#166534}.target-pill{background:#dbeafe;color:#1d4ed8}.injured-pill{background:#fee2e2;color:#991b1b}.avatar{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:50%;background:#dbeafe;color:#1d4ed8;font-weight:900;margin-right:8px}.sidecol{display:grid;gap:14px}.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden}.bar span{height:100%;display:block;background:#16a34a}.bar.warn span{background:#f59e0b}.bar.bad span{background:#dc2626}.mini{display:flex;justify-content:space-between;gap:10px;border:1px solid #e5e7eb;background:#fbfdff;border-radius:12px;padding:10px;margin-top:9px}.mini span{color:#64748b;font-size:12px}.empty{padding:25px;text-align:center;color:#64748b}.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:20}.modal{display:none;position:fixed;right:20px;top:20px;width:540px;max-width:calc(100vw - 40px);max-height:calc(100vh - 40px);overflow:auto;background:white;border-radius:18px;padding:18px;box-shadow:0 30px 80px rgba(0,0,0,.25);z-index:21}.open{display:block}.form{display:grid;grid-template-columns:1fr 1fr;gap:11px}.full{grid-column:1/-1}.form label{display:block;font-size:11px;text-transform:uppercase;color:#64748b;font-weight:900;margin-bottom:5px}.form input,.form select,.form textarea{width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:10px;color:#111827}.form textarea{min-height:75px}.modal-actions{display:flex;justify-content:space-between;gap:10px;margin-top:14px}.modal-actions div{display:flex;gap:8px}.toast{position:fixed;right:20px;bottom:20px;background:#071423;color:white;border-radius:10px;padding:12px 14px;display:none;z-index:50}@media(max-width:1050px){.app{display:block}.side{width:100%;height:auto}.content,.cards{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}.top{display:block}.actions{margin-top:12px}}@media(max-width:650px){.toolbar,.form{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}.modal{left:10px;right:10px;top:10px;width:auto}}@media print{.side,.actions,.tabs,.toolbar,.btn,.modal,.modal-bg{display:none!important}.app{display:block}.main{padding:0}.card{box-shadow:none}.content{grid-template-columns:1fr}.cards{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="modal-bg" id="modalBg"></div>
<div class="modal" id="modal"><h2 id="modalTitle">Edit Player</h2><div id="modalBody"></div></div>
<div class="toast" id="toast">Saved</div>
<div class="app">
  <aside class="side">
    <div class="brand">Roster GM<small>Volleyball + Basketball</small></div>
    <div class="nav active" data-view="dashboard">Dashboard</div>
    <div class="nav" data-view="roster">Roster</div>
    <div class="nav" data-view="stats">Stats</div>
    <div class="nav" data-view="money">Money / Budget</div>
    <div class="nav" data-view="presentation">Presentation</div>
  </aside>
  <main class="main">
    <section class="top">
      <div><div class="eyebrow">GM Command Center</div><h1 class="title" id="pageTitle">Volleyball GM Dashboard</h1><p class="sub">Roster, stats, salary/NIL budget, scholarships, and presentation view.</p></div>
      <div class="actions"><div class="sport"><button id="vbBtn" class="active">Volleyball</button><button id="bbBtn">Basketball</button></div><button class="btn" id="addBtn">+ Add Player</button><button class="btn secondary" id="budgetBtn">Edit Budget</button></div>
    </section>
    <section class="cards" id="kpis"></section>
    <section class="tabs" id="tabs"></section>
    <section class="toolbar"><input class="field" id="search" placeholder="Search players..."><select class="field" id="posFilter"></select><select class="field" id="statusFilter"><option value="all">All Statuses</option><option>Active</option><option>Target</option><option>Injured</option><option>Redshirt</option></select><select class="field" id="sortBy"><option value="value">Best Value</option><option value="salary">Highest Salary</option><option value="stat">Top Main Stat</option><option value="name">Name A-Z</option></select><button class="btn secondary" id="csvBtn">Export CSV</button></section>
    <section class="content"><div class="card"><div class="panel-head"><h3 id="tableTitle">Roster</h3><button class="btn small secondary" id="statsBtn">Add Stats</button></div><div class="table-wrap" id="tableWrap"></div></div><aside class="sidecol"><div class="card" id="budgetCard"></div><div class="card" id="insightCard"></div><div class="card" id="presentCard"></div></aside></section>
  </main>
</div>
<script>
var state, view;
var demo = {
  sport:'volleyball',
  budget:{volleyball:250000,basketball:350000},
  scholarships:{volleyball:12,basketball:13},
  players:[
    {id:1,sport:'volleyball',name:'Avery Johnson',pos:'OH',year:'JR',status:'Active',salary:22000,scholarship:1,notes:'Six-rotation pin. High serve receive value.',stats:{kills:315,blocks:42,aces:31,digs:255,hitting:.284,points:388,rebounds:0,assists:0,steals:0,fg:0}},
    {id:2,sport:'volleyball',name:'Mia Torres',pos:'S',year:'SO',status:'Active',salary:18500,scholarship:1,notes:'Tempo setter. Strong connection with middles.',stats:{kills:62,blocks:38,aces:28,digs:210,hitting:.310,points:128,rebounds:0,assists:945,steals:0,fg:0}},
    {id:3,sport:'volleyball',name:'Kendall Lee',pos:'MB',year:'SR',status:'Active',salary:20000,scholarship:1,notes:'Best blocker, efficient attacker.',stats:{kills:190,blocks:118,aces:12,digs:45,hitting:.366,points:320,rebounds:0,assists:8,steals:0,fg:0}},
    {id:4,sport:'basketball',name:'Jordan Carter',pos:'G',year:'JR',status:'Active',salary:42000,scholarship:1,notes:'Lead guard. Primary creator.',stats:{points:16.8,rebounds:4.1,assists:5.7,steals:1.6,fg:.461,kills:0,blocks:0,aces:0,digs:0,hitting:0}},
    {id:5,sport:'basketball',name:'Sam Rivera',pos:'F',year:'SO',status:'Target',salary:36000,scholarship:1,notes:'Switchable forward with shooting upside.',stats:{points:13.2,rebounds:7.4,assists:2.1,steals:.9,fg:.498,kills:0,blocks:0,aces:0,digs:0,hitting:0}},
    {id:6,sport:'basketball',name:'Malik Brooks',pos:'C',year:'SR',status:'Active',salary:38000,scholarship:1,notes:'Rim protection and offensive glass.',stats:{points:10.6,rebounds:9.1,assists:1.4,steals:.7,fg:.552,kills:0,blocks:1.9,aces:0,digs:0,hitting:0}}
  ]
};
function $(id){return document.getElementById(id)}
function clone(obj){return JSON.parse(JSON.stringify(obj))}
function load(){try{var raw=localStorage.getItem('rosterGMStable1');if(raw){var parsed=JSON.parse(raw);if(parsed && parsed.players){return parsed}}}catch(e){}return clone(demo)}
function save(){localStorage.setItem('rosterGMStable1',JSON.stringify(state))}
function money(n){return Number(n||0).toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0})}
function num(v){return Number(v||0)}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function sportLabel(){return state.sport==='volleyball'?'Volleyball':'Basketball'}
function allPlayers(){return state.players.filter(function(p){return p.sport===state.sport})}
function budget(){return num(state.budget[state.sport])}
function scholarshipLimit(){return num(state.scholarships[state.sport])}
function spent(){return allPlayers().reduce(function(s,p){return s+num(p.salary)},0)}
function usedShips(){return allPlayers().reduce(function(s,p){return s+num(p.scholarship)},0)}
function mainStat(p){if(state.sport==='volleyball'){return num(p.stats.points || (num(p.stats.kills)+num(p.stats.blocks)+num(p.stats.aces)))}return num(p.stats.points)}
function valueScore(p){return Math.round((mainStat(p)*1000)/((num(p.salary)/1000)+1))}
function positions(){return state.sport==='volleyball'?['All Positions','OH','MB','OPP','S','L','DS']:['All Positions','G','F','C','PG','SG','SF','PF']}
function filteredRows(){var q=$('search').value.toLowerCase();var pos=$('posFilter').value;var status=$('statusFilter').value;var sort=$('sortBy').value;var rows=allPlayers().filter(function(p){var text=(p.name+' '+p.pos+' '+p.year+' '+p.status+' '+p.notes).toLowerCase();return text.indexOf(q)>-1 && (pos==='All Positions'||p.pos===pos) && (status==='all'||p.status===status)});rows.sort(function(a,b){if(sort==='salary')return num(b.salary)-num(a.salary);if(sort==='name')return a.name.localeCompare(b.name);if(sort==='stat')return mainStat(b)-mainStat(a);return valueScore(b)-valueScore(a)});return rows}
function render(){renderHeader();renderPositions();renderKpis();renderTabs();renderContent()}
function renderHeader(){$('pageTitle').textContent=sportLabel()+' GM Dashboard';$('vbBtn').className=state.sport==='volleyball'?'active':'';$('bbBtn').className=state.sport==='basketball'?'active':''}
function renderPositions(){var old=$('posFilter').value||'All Positions';var list=positions();$('posFilter').innerHTML=list.map(function(p){return '<option>'+p+'</option>'}).join('');$('posFilter').value=list.indexOf(old)>-1?old:'All Positions'}
function renderKpis(){var ps=allPlayers();var sp=spent();var left=budget()-sp;var top=ps.slice().sort(function(a,b){return valueScore(b)-valueScore(a)})[0];$('kpis').innerHTML='<div class="card kpi"><label>Roster</label><b>'+ps.length+'</b><small>'+sportLabel()+' players</small></div><div class="card kpi"><label>Budget Used</label><b>'+money(sp)+'</b><small>'+((budget()?sp/budget()*100:0).toFixed(1))+'% of '+money(budget())+'</small></div><div class="card kpi"><label>Budget Left</label><b style="color:'+(left<0?'#dc2626':'#16a34a')+'">'+money(left)+'</b><small>'+(left<0?'Over budget':'Available')+'</small></div><div class="card kpi"><label>Scholarships</label><b>'+usedShips()+'/'+scholarshipLimit()+'</b><small>Used / available</small></div><div class="card kpi"><label>Best Value</label><b>'+(top?esc(top.name.split(' ')[0]):'-')+'</b><small>'+(top?valueScore(top)+' score':'Add players')+'</small></div>'}
function renderTabs(){var tabs=[['dashboard','Overview'],['roster','Roster Builder'],['stats','Stats + Value'],['money','Money / Budget'],['presentation','Presentation']];$('tabs').innerHTML=tabs.map(function(t){return '<button class="tab '+(view===t[0]?'active':'')+'" data-tab="'+t[0]+'">'+t[1]+'</button>'}).join('');var buttons=document.querySelectorAll('[data-tab]');for(var i=0;i<buttons.length;i++){buttons[i].onclick=function(){view=this.getAttribute('data-tab');syncNav();renderContent();renderTabs()}}}
function syncNav(){var navs=document.querySelectorAll('.nav');for(var i=0;i<navs.length;i++){navs[i].className='nav '+(navs[i].getAttribute('data-view')===view?'active':'')}}
function renderContent(){var rows=filteredRows();$('tableTitle').textContent=view==='stats'?'Stats Board':view==='money'?'Money Board':view==='presentation'?'Presentation Roster':'Roster Board';$('tableWrap').innerHTML=view==='stats'?statsTable(rows):rosterTable(rows);renderBudgetCard();renderInsightCard(rows);renderPresentCard();bindRows()}
function rosterTable(rows){if(!rows.length)return '<div class="empty">No players found. Click + Add Player to build your roster.</div>';var html='<table><thead><tr><th>Player</th><th>Sport</th><th>Pos</th><th>Year</th><th>Status</th><th class="num">Salary/NIL</th><th class="num">Sch</th><th class="num">Main Stat</th><th class="num">Value</th></tr></thead><tbody>';for(var i=0;i<rows.length;i++){var p=rows[i];html+='<tr data-id="'+p.id+'"><td><span class="avatar">'+esc((p.name||'?')[0])+'</span><b>'+esc(p.name)+'</b></td><td><span class="pill '+(p.sport==='volleyball'?'vb':'bb')+'">'+(p.sport==='volleyball'?'VB':'BB')+'</span></td><td>'+esc(p.pos)+'</td><td>'+esc(p.year)+'</td><td><span class="pill '+String(p.status).toLowerCase()+'-pill">'+esc(p.status)+'</span></td><td class="num">'+money(p.salary)+'</td><td class="num">'+num(p.scholarship)+'</td><td class="num">'+mainStat(p)+'</td><td class="num"><b>'+valueScore(p)+'</b></td></tr>'}return html+'</tbody></table>'}
function statsTable(rows){if(!rows.length)return '<div class="empty">No players found. Add players or clear filters.</div>';var vb=state.sport==='volleyball';var head=vb?'<th class="num">Kills</th><th class="num">Blocks</th><th class="num">Aces</th><th class="num">Digs</th><th class="num">Hit %</th><th class="num">Points</th>':'<th class="num">PTS</th><th class="num">REB</th><th class="num">AST</th><th class="num">STL</th><th class="num">FG%</th>';var html='<table><thead><tr><th>Player</th><th>Pos</th>'+head+'<th class="num">Value</th></tr></thead><tbody>';for(var i=0;i<rows.length;i++){var p=rows[i];html+='<tr data-id="'+p.id+'"><td><span class="avatar">'+esc((p.name||'?')[0])+'</span><b>'+esc(p.name)+'</b></td><td>'+esc(p.pos)+'</td>';if(vb){html+='<td class="num">'+num(p.stats.kills)+'</td><td class="num">'+num(p.stats.blocks)+'</td><td class="num">'+num(p.stats.aces)+'</td><td class="num">'+num(p.stats.digs)+'</td><td class="num">'+num(p.stats.hitting).toFixed(3)+'</td><td class="num">'+mainStat(p)+'</td>'}else{html+='<td class="num">'+num(p.stats.points)+'</td><td class="num">'+num(p.stats.rebounds)+'</td><td class="num">'+num(p.stats.assists)+'</td><td class="num">'+num(p.stats.steals)+'</td><td class="num">'+num(p.stats.fg).toFixed(3)+'</td>'}html+='<td class="num"><b>'+valueScore(p)+'</b></td></tr>'}return html+'</tbody></table>'}
function renderBudgetCard(){var sp=spent();var u=budget()?sp/budget()*100:0;var cls=u>100?'bad':u>85?'warn':'';$('budgetCard').innerHTML='<div class="panel-head"><h3>Budget Tracker</h3><button class="btn small secondary" id="editBudgetSide">Edit</button></div><div class="bar '+cls+'"><span style="width:'+Math.min(100,u)+'%"></span></div><p style="color:#64748b">'+money(sp)+' used of '+money(budget())+'</p><div class="mini"><div><b>Remaining</b><br><span>Current sport</span></div><b>'+money(budget()-sp)+'</b></div><div class="mini"><div><b>Scholarships</b><br><span>Used / available</span></div><b>'+usedShips()+' / '+scholarshipLimit()+'</b></div>';$('editBudgetSide').onclick=openBudget}
function renderInsightCard(rows){var top=rows.slice().sort(function(a,b){return valueScore(b)-valueScore(a)}).slice(0,3);var html='<div class="panel-head"><h3>GM Insights</h3></div>';if(!top.length){html+='<p style="color:#64748b">No players match filters.</p>'}for(var i=0;i<top.length;i++){var p=top[i];html+='<div class="mini"><div><b>'+esc(p.name)+'</b><br><span>'+esc(p.pos)+' • '+money(p.salary)+' • '+mainStat(p)+' stat</span></div><b>'+valueScore(p)+'</b></div>'}$('insightCard').innerHTML=html}
function renderPresentCard(){$('presentCard').innerHTML='<div class="panel-head"><h3>Presentation</h3></div><p style="color:#64748b">Print or save as PDF for staff meetings.</p><button class="btn small" id="printBtn">Print / PDF</button> <button class="btn small secondary" id="resetBtn">Reset Demo</button>';$('printBtn').onclick=function(){window.print()};$('resetBtn').onclick=function(){if(confirm('Reset all demo data?')){localStorage.removeItem('rosterGMStable1');state=clone(demo);view='dashboard';syncNav();render();toast('Reset complete')}}}
function blankPlayer(){return{id:Date.now(),sport:state.sport,name:'',pos:state.sport==='volleyball'?'OH':'G',year:'FR',status:'Active',salary:0,scholarship:0,notes:'',stats:{kills:0,blocks:0,aces:0,digs:0,hitting:0,points:0,rebounds:0,assists:0,steals:0,fg:0}}}
function openPlayer(id){var existing=!!id;var p=existing?state.players.find(function(x){return x.id===Number(id)}):blankPlayer();if(!p)return;var vb=p.sport==='volleyball';$('modalTitle').textContent=existing?'Edit Player':'Add Player';var posOptions=(p.sport==='volleyball'?['OH','MB','OPP','S','L','DS']:['G','F','C','PG','SG','SF','PF']).map(function(x){return '<option '+(x===p.pos?'selected':'')+'>'+x+'</option>'}).join('');$('modalBody').innerHTML='<div class="form"><div class="full"><label>Name</label><input id="pName" value="'+esc(p.name)+'" placeholder="Player name"></div><div><label>Sport</label><select id="pSport"><option value="volleyball">Volleyball</option><option value="basketball">Basketball</option></select></div><div><label>Position</label><select id="pPos">'+posOptions+'</select></div><div><label>Year</label><select id="pYear"><option>FR</option><option>SO</option><option>JR</option><option>SR</option><option>Target</option></select></div><div><label>Status</label><select id="pStatus"><option>Active</option><option>Target</option><option>Injured</option><option>Redshirt</option></select></div><div><label>Salary / NIL</label><input id="pSalary" type="number" value="'+num(p.salary)+'"></div><div><label>Scholarship</label><input id="pShip" type="number" step="0.25" value="'+num(p.scholarship)+'"></div><div class="full"><label>Notes</label><textarea id="pNotes">'+esc(p.notes)+'</textarea></div><div class="full"><b>'+(vb?'Volleyball Stats':'Basketball Stats')+'</b></div><div><label>'+(vb?'Kills':'Points / Game')+'</label><input id="s1" type="number" step="0.001" value="'+(vb?num(p.stats.kills):num(p.stats.points))+'"></div><div><label>'+(vb?'Blocks':'Rebounds / Game')+'</label><input id="s2" type="number" step="0.001" value="'+(vb?num(p.stats.blocks):num(p.stats.rebounds))+'"></div><div><label>'+(vb?'Aces':'Assists / Game')+'</label><input id="s3" type="number" step="0.001" value="'+(vb?num(p.stats.aces):num(p.stats.assists))+'"></div><div><label>'+(vb?'Digs':'Steals / Game')+'</label><input id="s4" type="number" step="0.001" value="'+(vb?num(p.stats.digs):num(p.stats.steals))+'"></div><div><label>'+(vb?'Hitting %':'FG %')+'</label><input id="s5" type="number" step="0.001" value="'+(vb?num(p.stats.hitting):num(p.stats.fg))+'"></div></div><div class="modal-actions"><button class="btn danger" id="deleteP" '+(existing?'':'style="visibility:hidden"')+'>Delete</button><div><button class="btn secondary" id="cancelP">Cancel</button><button class="btn" id="saveP">Save</button></div></div>';$('pSport').value=p.sport;$('pYear').value=p.year;$('pStatus').value=p.status;$('pSport').onchange=function(){p.sport=this.value;p.pos=p.sport==='volleyball'?'OH':'G';state.sport=p.sport;openPlayer(existing?p.id:null)};$('cancelP').onclick=closeModal;$('deleteP').onclick=function(){if(confirm('Delete this player?')){state.players=state.players.filter(function(x){return x.id!==p.id});save();closeModal();render();toast('Player deleted')}};$('saveP').onclick=function(){savePlayer(p,existing)};openModal()}
function savePlayer(p,existing){p.name=$('pName').value.trim()||'Unnamed Player';p.sport=$('pSport').value;p.pos=$('pPos').value;p.year=$('pYear').value;p.status=$('pStatus').value;p.salary=num($('pSalary').value);p.scholarship=num($('pShip').value);p.notes=$('pNotes').value;p.stats=p.stats||{};if(p.sport==='volleyball'){p.stats.kills=num($('s1').value);p.stats.blocks=num($('s2').value);p.stats.aces=num($('s3').value);p.stats.digs=num($('s4').value);p.stats.hitting=num($('s5').value);p.stats.points=p.stats.kills+p.stats.blocks+p.stats.aces}else{p.stats.points=num($('s1').value);p.stats.rebounds=num($('s2').value);p.stats.assists=num($('s3').value);p.stats.steals=num($('s4').value);p.stats.fg=num($('s5').value)}if(!existing){state.players.push(p)}state.sport=p.sport;save();closeModal();render();toast('Player saved')}
function openBudget(){$('modalTitle').textContent='Edit Budget / Scholarships';$('modalBody').innerHTML='<div class="form"><div><label>Volleyball Budget</label><input id="bVB" type="number" value="'+num(state.budget.volleyball)+'"></div><div><label>Basketball Budget</label><input id="bBB" type="number" value="'+num(state.budget.basketball)+'"></div><div><label>Volleyball Scholarships</label><input id="sVB" type="number" step="0.25" value="'+num(state.scholarships.volleyball)+'"></div><div><label>Basketball Scholarships</label><input id="sBB" type="number" step="0.25" value="'+num(state.scholarships.basketball)+'"></div></div><div class="modal-actions"><span></span><div><button class="btn secondary" id="cancelB">Cancel</button><button class="btn" id="saveB">Save</button></div></div>';$('cancelB').onclick=closeModal;$('saveB').onclick=function(){state.budget.volleyball=num($('bVB').value);state.budget.basketball=num($('bBB').value);state.scholarships.volleyball=num($('sVB').value);state.scholarships.basketball=num($('sBB').value);save();closeModal();render();toast('Budget saved')};openModal()}
function openModal(){$('modalBg').className='modal-bg open';$('modal').className='modal open'}
function closeModal(){$('modalBg').className='modal-bg';$('modal').className='modal'}
function bindRows(){var rows=document.querySelectorAll('[data-id]');for(var i=0;i<rows.length;i++){rows[i].onclick=function(){openPlayer(this.getAttribute('data-id'))}}}
function exportCsv(){var header=['Sport','Name','Position','Year','Status','Salary','Scholarship','Kills','Blocks','Aces','Digs','Hitting','Points','Rebounds','Assists','Steals','FG','Notes'];var rows=state.players.map(function(p){return [p.sport,p.name,p.pos,p.year,p.status,p.salary,p.scholarship,p.stats.kills,p.stats.blocks,p.stats.aces,p.stats.digs,p.stats.hitting,p.stats.points,p.stats.rebounds,p.stats.assists,p.stats.steals,p.stats.fg,p.notes]});var csv=[header].concat(rows).map(function(r){return r.map(function(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'}).join(',')}).join('
');var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='roster-gm-command-center.csv';a.click();URL.revokeObjectURL(a.href);toast('CSV exported')}
function toast(msg){$('toast').textContent=msg;$('toast').style.display='block';setTimeout(function(){$('toast').style.display='none'},1500)}
function boot(){state=load();view='dashboard';var navs=document.querySelectorAll('.nav');for(var i=0;i<navs.length;i++){navs[i].onclick=function(){view=this.getAttribute('data-view');syncNav();renderContent();renderTabs()}}$('vbBtn').onclick=function(){state.sport='volleyball';render()};$('bbBtn').onclick=function(){state.sport='basketball';render()};$('addBtn').onclick=function(){openPlayer()};$('budgetBtn').onclick=openBudget;$('modalBg').onclick=closeModal;$('search').oninput=renderContent;$('posFilter').onchange=renderContent;$('statusFilter').onchange=renderContent;$('sortBy').onchange=renderContent;$('csvBtn').onclick=exportCsv;$('statsBtn').onclick=function(){view='stats';syncNav();render();toast('Click any player to edit stats')};render()}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot)}else{boot()}
</script>
</body>
</html>
