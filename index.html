<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roster GM Command Center</title>
<style>
:root{--bg:#f6f8fb;--ink:#101950;--muted:#65758b;--card:#fff;--line:#e5eaf2;--dark:#0b1b2b;--dark2:#10263a;--blue:#1769ff;--green:#19b56b;--yellow:#f7b731;--red:#e5484d;--vb:#7c3aed;--bb:#f97316;--shadow:0 14px 34px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}.side{background:#071423;color:#dbe7f5;padding:22px 16px;position:sticky;top:0;height:100vh}.brand{font-weight:950;font-size:18px;line-height:1.1;margin-bottom:22px}.brand span{display:block;color:#8fb4ff;font-size:12px;text-transform:uppercase;letter-spacing:.12em;margin-top:4px}.nav{display:flex;align-items:center;gap:10px;padding:12px 12px;border-radius:12px;color:#c7d6e8;margin:5px 0}.nav.active,.nav:hover{background:#122a42;color:#fff}.main{padding:24px;min-width:0}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.eyebrow{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.12em}.title{font-size:32px;line-height:1.05;margin:5px 0 6px}.sub{color:var(--muted);margin:0}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;background:var(--blue);color:#fff;border-radius:12px;padding:10px 14px;font-weight:850;box-shadow:0 10px 24px rgba(23,105,255,.18)}.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}.btn.danger{background:var(--red)}.btn.small{padding:7px 10px;border-radius:10px;font-size:12px}.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(5,minmax(140px,1fr));margin-bottom:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px;min-width:0}.kpi label{display:block;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase}.kpi b{display:block;font-size:24px;margin-top:8px}.kpi small{color:var(--muted)}.sport-toggle{display:inline-grid;grid-template-columns:1fr 1fr;background:#edf2f8;border:1px solid var(--line);border-radius:14px;padding:4px}.sport-toggle button{border:0;background:transparent;border-radius:10px;padding:8px 12px;font-weight:900;color:var(--muted)}.sport-toggle button.active{background:#fff;color:var(--ink);box-shadow:0 5px 16px rgba(15,23,42,.08)}.toolbar{display:grid;grid-template-columns:1.2fr 160px 160px 160px auto;gap:10px;margin-bottom:14px}.field{width:100%;height:42px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);padding:0 12px}.content{display:grid;grid-template-columns:1.7fr .9fr;gap:14px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th{color:var(--muted);text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:10px 8px;border-bottom:1px solid var(--line)}td{padding:11px 8px;border-bottom:1px solid var(--line);vertical-align:middle}tr:hover td{background:#f8fbff}.num{text-align:right}.player{display:flex;align-items:center;gap:10px;font-weight:850}.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#dbeafe,#bfdbfe);display:grid;place-items:center;color:#173b77;font-weight:950}.tag{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;background:#f1f5f9;color:#334155;font-size:12px;font-weight:800}.tag.vb{background:#f3e8ff;color:#6d28d9}.tag.bb{background:#ffedd5;color:#c2410c}.bar{height:10px;background:#edf2f7;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--green)}.bar.warn span{background:var(--yellow)}.bar.bad span{background:var(--red)}.panel-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.panel-title h3{margin:0;font-size:16px}.mini-list{display:grid;gap:10px}.mini-row{display:flex;justify-content:space-between;gap:12px;padding:10px;border:1px solid var(--line);border-radius:14px;background:#fbfdff}.mini-row span{color:var(--muted);font-size:12px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-weight:850;color:var(--muted)}.tab.active{background:#0b1b2b;color:#fff;border-color:#0b1b2b}.modal-bg{position:fixed;inset:0;background:rgba(2,6,23,.45);display:none;z-index:20}.modal{position:fixed;right:22px;top:22px;width:520px;max-width:calc(100vw - 44px);max-height:calc(100vh - 44px);overflow:auto;background:#fff;border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.25);padding:18px;display:none;z-index:21}.modal.open,.modal-bg.open{display:block}.modal h2{margin:0 0 12px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form .full{grid-column:1/-1}.form label{display:block;font-size:12px;color:var(--muted);font-weight:850;text-transform:uppercase;margin-bottom:5px}.form input,.form select,.form textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;color:var(--ink)}.form textarea{min-height:80px}.modal-actions{display:flex;justify-content:space-between;gap:10px;margin-top:14px}.toast{position:fixed;right:22px;bottom:22px;background:#0b1b2b;color:#fff;border-radius:12px;padding:12px 14px;opacity:0;transform:translateY(8px);transition:.2s;z-index:30}.toast.show{opacity:1;transform:translateY(0)}.hide{display:none!important}.print-only{display:none}
@media(max-width:1100px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.content,.kpis{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}.main{padding:16px}}@media print{.side,.toolbar,.actions,.tabs,.btn,.modal,.modal-bg{display:none!important}.app{display:block}.main{padding:0}.card{box-shadow:none;break-inside:avoid}.print-only{display:block}.content,.kpis{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="modal-bg" id="modalBg"></div><div class="toast" id="toast"></div>
<aside class="modal" id="modal"><h2 id="modalTitle">Edit</h2><div id="modalBody"></div></aside>
<div class="app">
  <aside class="side">
    <div class="brand">Roster GM<span>Volleyball + Basketball</span></div>
    <div class="nav active" data-view="dashboard">Dashboard</div>
    <div class="nav" data-view="roster">Roster</div>
    <div class="nav" data-view="stats">Stats</div>
    <div class="nav" data-view="money">Money / Cap</div>
    <div class="nav" data-view="reports">Presentation</div>
  </aside>
  <main class="main">
    <section class="top">
      <div><div class="eyebrow">GM Command Center</div><h1 class="title" id="pageTitle">Team Dashboard</h1><p class="sub">Build a roster, track salaries, and present volleyball or basketball player value.</p></div>
      <div class="actions"><div class="sport-toggle"><button id="sportVB">Volleyball</button><button id="sportBB">Basketball</button></div><button class="btn" id="addPlayer">+ Add Player</button><button class="btn ghost" id="editCap">Edit Budget</button></div>
    </section>
    <section class="grid kpis" id="kpis"></section>
    <section class="tabs" id="tabs"></section>
    <section class="toolbar"><input class="field" id="search" placeholder="Search roster..."><select class="field" id="filterPosition"></select><select class="field" id="sortBy"><option value="value">Sort: Best Value</option><option value="salary">Sort: Salary</option><option value="name">Sort: Name</option><option value="points">Sort: Main Stat</option></select><select class="field" id="filterStatus"><option value="all">All Statuses</option><option value="Active">Active</option><option value="Target">Target</option><option value="Injured">Injured</option><option value="Redshirt">Redshirt</option></select><button class="btn ghost" id="exportCsv">Export CSV</button></section>
    <section class="content"><div class="card"><div class="panel-title"><h3 id="tableTitle">Roster</h3><button class="btn small ghost" id="quickStats">Quick Add Stats</button></div><div class="table-wrap" id="tableWrap"></div></div><aside class="grid"><div class="card" id="budgetCard"></div><div class="card" id="insightsCard"></div><div class="card" id="presentCard"></div></aside></section>
  </main>
</div>
<script>
(function(){
const $=id=>document.getElementById(id);
const defaults={sport:'volleyball',budget:250000,scholarships:12,players:[
{id:1,sport:'volleyball',name:'Avery Johnson',pos:'OH',year:'JR',status:'Active',salary:22000,scholarship:1,notes:'Six-rotation pin. High serve receive value.',stats:{kills:315,blocks:42,aces:31,digs:255,hitting:.284,points:372,rebounds:0,assists:0,steals:0,fg:.0}},
{id:2,sport:'volleyball',name:'Mia Torres',pos:'S',year:'SO',status:'Active',salary:18500,scholarship:1,notes:'Tempo setter. Strong connection with middles.',stats:{kills:62,blocks:38,aces:28,digs:210,hitting:.310,points:112,rebounds:0,assists:945,steals:0,fg:.0}},
{id:3,sport:'volleyball',name:'Kendall Lee',pos:'MB',year:'SR',status:'Active',salary:20000,scholarship:1,notes:'Best blocker, efficient attacker.',stats:{kills:190,blocks:118,aces:12,digs:45,hitting:.366,points:261,rebounds:0,assists:8,steals:0,fg:.0}},
{id:4,sport:'basketball',name:'Jordan Carter',pos:'G',year:'JR',status:'Active',salary:42000,scholarship:1,notes:'Lead guard. Primary creator.',stats:{points:16.8,rebounds:4.1,assists:5.7,steals:1.6,fg:.461,kills:0,blocks:0,aces:0,digs:0,hitting:0}},
{id:5,sport:'basketball',name:'Sam Rivera',pos:'F',year:'SO',status:'Target',salary:36000,scholarship:1,notes:'Switchable forward with shooting upside.',stats:{points:13.2,rebounds:7.4,assists:2.1,steals:.9,fg:.498,kills:0,blocks:0,aces:0,digs:0,hitting:0}},
{id:6,sport:'basketball',name:'Malik Brooks',pos:'C',year:'SR',status:'Active',salary:38000,scholarship:1,notes:'Rim protection and offensive glass.',stats:{points:10.6,rebounds:9.1,assists:1.4,steals:.7,fg:.552,kills:0,blocks:1.9,aces:0,digs:0,hitting:0}}
]};
let state=load(),view='dashboard';
function load(){try{let r=localStorage.getItem('rosterGMCleanV1');if(r)return JSON.parse(r)}catch(e){}return JSON.parse(JSON.stringify(defaults))}
function save(){localStorage.setItem('rosterGMCleanV1',JSON.stringify(state))}
function fmt(n){return Number(n||0).toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0})}
function pct(n,d){return d?Number(n||0)/Number(d)*100:0}
function sportPlayers(){return state.players.filter(p=>p.sport===state.sport)}
function positions(){return state.sport==='volleyball'?['All Positions','OH','MB','OPP','S','L','DS']:['All Positions','G','F','C','PG','SG','SF','PF']}
function mainStat(p){return state.sport==='volleyball'?Number(p.stats.points||0):Number(p.stats.points||0)}
function valueScore(p){return Math.round((mainStat(p)*1000)/(Number(p.salary||1)/1000+1))}
function render(){document.body.classList.toggle('basketball',state.sport==='basketball');$('sportVB').classList.toggle('active',state.sport==='volleyball');$('sportBB').classList.toggle('active',state.sport==='basketball');$('pageTitle').textContent=state.sport==='volleyball'?'Volleyball GM Dashboard':'Basketball GM Dashboard';renderPositions();renderKpis();renderTabs();renderMain();}
function renderPositions(){let cur=$('filterPosition').value||'All Positions';$('filterPosition').innerHTML=positions().map(p=>`<option>${p}</option>`).join('');$('filterPosition').value=positions().includes(cur)?cur:'All Positions'}
function renderKpis(){let ps=sportPlayers(),spent=ps.reduce((s,p)=>s+Number(p.salary||0),0),ships=ps.reduce((s,p)=>s+Number(p.scholarship||0),0),top=[...ps].sort((a,b)=>valueScore(b)-valueScore(a))[0];$('kpis').innerHTML=`<div class="card kpi"><label>Roster</label><b>${ps.length}</b><small>${state.sport}</small></div><div class="card kpi"><label>Budget Used</label><b>${fmt(spent)}</b><small>${pct(spent,state.budget).toFixed(1)}% of ${fmt(state.budget)}</small></div><div class="card kpi"><label>Budget Left</label><b>${fmt(state.budget-spent)}</b><small>${spent>state.budget?'Over budget':'Available'}</small></div><div class="card kpi"><label>Scholarships</label><b>${ships}/${state.scholarships}</b><small>editable team setting</small></div><div class="card kpi"><label>Best Value</label><b>${top?top.name.split(' ')[0]:'-'}</b><small>${top?valueScore(top)+' value score':'Add players'}</small></div>`}
function renderTabs(){let tabs=['dashboard','roster','stats','money','reports'];$('tabs').innerHTML=tabs.map(t=>`<button class="tab ${view===t?'active':''}" data-viewtop="${t}">${label(t)}</button>`).join('');document.querySelectorAll('[data-viewtop]').forEach(b=>b.onclick=()=>{view=b.dataset.viewtop;document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('active',n.dataset.view===view));renderMain();renderTabs()})}
function label(t){return {dashboard:'Overview',roster:'Roster Builder',stats:'Stats + Value',money:'Money / Cap',reports:'Presentation'}[t]}
function filtered(){let q=$('search').value.toLowerCase(),pos=$('filterPosition').value,status=$('filterStatus').value,sort=$('sortBy').value;let rows=sportPlayers().filter(p=>(p.name+p.pos+p.year+p.status+p.notes).toLowerCase().includes(q)&&(pos==='All Positions'||p.pos===pos)&&(status==='all'||p.status===status));rows.sort((a,b)=>sort==='salary'?b.salary-a.salary:sort==='name'?a.name.localeCompare(b.name):sort==='points'?mainStat(b)-mainStat(a):valueScore(b)-valueScore(a));return rows}
function renderMain(){let rows=filtered();$('tableTitle').textContent=label(view);$('tableWrap').innerHTML= view==='stats'?statsTable(rows):rosterTable(rows);renderBudget();renderInsights(rows);renderPresent();bindRows()}
function rosterTable(rows){return `<table><thead><tr><th>Player</th><th>Sport</th><th>Pos</th><th>Year</th><th>Status</th><th class="num">Salary</th><th class="num">Value</th></tr></thead><tbody>${rows.map(p=>`<tr data-row="${p.id}"><td><div class="player"><span class="avatar">${p.name[0]}</span>${p.name}</div></td><td><span class="tag ${p.sport==='volleyball'?'vb':'bb'}">${p.sport}</span></td><td>${p.pos}</td><td>${p.year}</td><td>${p.status}</td><td class="num">${fmt(p.salary)}</td><td class="num">${valueScore(p)}</td></tr>`).join('')}</tbody></table>`}
function statsTable(rows){let vb=state.sport==='volleyball';return `<table><thead><tr><th>Player</th><th>Pos</th>${vb?'<th class="num">Kills</th><th class="num">Blocks</th><th class="num">Aces</th><th class="num">Digs</th><th class="num">Hit %</th>':'<th class="num">PTS</th><th class="num">REB</th><th class="num">AST</th><th class="num">STL</th><th class="num">FG%</th>'}<th class="num">Value</th></tr></thead><tbody>${rows.map(p=>`<tr data-row="${p.id}"><td><div class="player"><span class="avatar">${p.name[0]}</span>${p.name}</div></td><td>${p.pos}</td>${vb?`<td class="num">${p.stats.kills||0}</td><td class="num">${p.stats.blocks||0}</td><td class="num">${p.stats.aces||0}</td><td class="num">${p.stats.digs||0}</td><td class="num">${Number(p.stats.hitting||0).toFixed(3)}</td>`:`<td class="num">${p.stats.points||0}</td><td class="num">${p.stats.rebounds||0}</td><td class="num">${p.stats.assists||0}</td><td class="num">${p.stats.steals||0}</td><td class="num">${Number(p.stats.fg||0).toFixed(3)}</td>`}<td class="num">${valueScore(p)}</td></tr>`).join('')}</tbody></table>`}
function renderBudget(){let ps=sportPlayers(),spent=ps.reduce((s,p)=>s+Number(p.salary||0),0),used=pct(spent,state.budget),cls=used>100?'bad':used>85?'warn':'';$('budgetCard').innerHTML=`<div class="panel-title"><h3>Budget Tracker</h3><button class="btn small ghost" id="editBudget2">Edit</button></div><div class="mini-list"><div><div class="bar ${cls}"><span style="width:${Math.min(100,used)}%"></span></div><p class="muted">${fmt(spent)} used of ${fmt(state.budget)} (${used.toFixed(1)}%)</p></div><div class="mini-row"><div><b>Remaining</b><br><span>Available money</span></div><b>${fmt(state.budget-spent)}</b></div><div class="mini-row"><div><b>Scholarships</b><br><span>Used / available</span></div><b>${ps.reduce((s,p)=>s+Number(p.scholarship||0),0)} / ${state.scholarships}</b></div></div>`;$('editBudget2').onclick=openBudget}
function renderInsights(rows){let top=[...rows].sort((a,b)=>valueScore(b)-valueScore(a)).slice(0,3);$('insightsCard').innerHTML=`<div class="panel-title"><h3>GM Insights</h3></div><div class="mini-list">${top.map(p=>`<div class="mini-row"><div><b>${p.name}</b><br><span>${p.pos} • ${fmt(p.salary)}</span></div><b>${valueScore(p)}</b></div>`).join('')||'<p class="muted">No players match current filters.</p>'}</div>`}
function renderPresent(){$('presentCard').innerHTML=`<div class="panel-title"><h3>Presentation Ready</h3></div><p class="muted">Use this view live or print/export it for a clean staff meeting snapshot.</p><div class="actions"><button class="btn small" id="printBtn">Print / PDF</button><button class="btn small ghost" id="resetBtn">Reset Demo</button></div>`;$('printBtn').onclick=()=>window.print();$('resetBtn').onclick=()=>{if(confirm('Reset all demo data?')){localStorage.removeItem('rosterGMCleanV1');state=load();view='dashboard';render();toast('Reset complete')}}}
function openPlayer(id){let p=id?state.players.find(x=>x.id===Number(id)):newPlayer();$('modalTitle').textContent=id?'Edit Player':'Add Player';let vb=p.sport==='volleyball';$('modalBody').innerHTML=`<div class="form"><div class="full"><label>Name</label><input id="pName" value="${esc(p.name)}"></div><div><label>Sport</label><select id="pSport"><option value="volleyball">Volleyball</option><option value="basketball">Basketball</option></select></div><div><label>Position</label><input id="pPos" value="${esc(p.pos)}"></div><div><label>Year</label><select id="pYear"><option>FR</option><option>SO</option><option>JR</option><option>SR</option><option>Target</option></select></div><div><label>Status</label><select id="pStatus"><option>Active</option><option>Target</option><option>Injured</option><option>Redshirt</option></select></div><div><label>Salary / NIL</label><input id="pSalary" type="number" value="${p.salary||0}"></div><div><label>Scholarship</label><input id="pShip" type="number" step="0.25" value="${p.scholarship||0}"></div><div class="full"><label>Notes</label><textarea id="pNotes">${esc(p.notes||'')}</textarea></div><div class="full"><hr></div><div><label>${vb?'Kills':'Points'}</label><input id="s1" type="number" step="0.001" value="${vb?(p.stats.kills||0):(p.stats.points||0)}"></div><div><label>${vb?'Blocks':'Rebounds'}</label><input id="s2" type="number" step="0.001" value="${vb?(p.stats.blocks||0):(p.stats.rebounds||0)}"></div><div><label>${vb?'Aces':'Assists'}</label><input id="s3" type="number" step="0.001" value="${vb?(p.stats.aces||0):(p.stats.assists||0)}"></div><div><label>${vb?'Digs':'Steals'}</label><input id="s4" type="number" step="0.001" value="${vb?(p.stats.digs||0):(p.stats.steals||0)}"></div><div><label>${vb?'Hitting %':'FG %'}</label><input id="s5" type="number" step="0.001" value="${vb?(p.stats.hitting||0):(p.stats.fg||0)}"></div></div><div class="modal-actions"><button class="btn danger" id="deleteP">Delete</button><div><button class="btn ghost" id="cancelP">Cancel</button> <button class="btn" id="saveP">Save Player</button></div></div>`;$('pSport').value=p.sport;$('pYear').value=p.year;$('pStatus').value=p.status;$('deleteP').style.visibility=id?'visible':'hidden';$('pSport').onchange=()=>{p.sport=$('pSport').value;openPlayer(id||p.id)};$('cancelP').onclick=closeModal;$('deleteP').onclick=()=>{state.players=state.players.filter(x=>x.id!==p.id);save();closeModal();render();toast('Player deleted')};$('saveP').onclick=()=>savePlayer(p,id);openModal()}
function newPlayer(){return{id:Date.now(),sport:state.sport,name:'',pos:state.sport==='volleyball'?'OH':'G',year:'FR',status:'Active',salary:0,scholarship:0,notes:'',stats:{kills:0,blocks:0,aces:0,digs:0,hitting:0,points:0,rebounds:0,assists:0,steals:0,fg:0}}}
function savePlayer(p,existing){p.name=$('pName').value||'Unnamed Player';p.sport=$('pSport').value;p.pos=$('pPos').value;p.year=$('pYear').value;p.status=$('pStatus').value;p.salary=Number($('pSalary').value)||0;p.scholarship=Number($('pShip').value)||0;p.notes=$('pNotes').value;p.stats=p.stats||{};if(p.sport==='volleyball'){p.stats.kills=Number($('s1').value)||0;p.stats.blocks=Number($('s2').value)||0;p.stats.aces=Number($('s3').value)||0;p.stats.digs=Number($('s4').value)||0;p.stats.hitting=Number($('s5').value)||0;p.stats.points=p.stats.kills+p.stats.blocks+p.stats.aces}else{p.stats.points=Number($('s1').value)||0;p.stats.rebounds=Number($('s2').value)||0;p.stats.assists=Number($('s3').value)||0;p.stats.steals=Number($('s4').value)||0;p.stats.fg=Number($('s5').value)||0}if(!existing)state.players.push(p);state.sport=p.sport;save();closeModal();render();toast('Player saved')}
function openBudget(){$('modalTitle').textContent='Edit Budget / Cap';$('modalBody').innerHTML=`<div class="form"><div><label>Team Budget</label><input id="bBudget" type="number" value="${state.budget}"></div><div><label>Scholarships</label><input id="bShips" type="number" step="0.25" value="${state.scholarships}"></div></div><div class="modal-actions"><button class="btn ghost" id="cancelB">Cancel</button><button class="btn" id="saveB">Save Budget</button></div>`;$('cancelB').onclick=closeModal;$('saveB').onclick=()=>{state.budget=Number($('bBudget').value)||0;state.scholarships=Number($('bShips').value)||0;save();closeModal();render();toast('Budget updated')};openModal()}
function quickStats(){view='stats';render();toast('Click any player row to add stats')}
function bindRows(){document.querySelectorAll('[data-row]').forEach(r=>r.onclick=()=>openPlayer(r.dataset.row))}
function openModal(){$('modalBg').classList.add('open');$('modal').classList.add('open')}
function closeModal(){$('modalBg').classList.remove('open');$('modal').classList.remove('open')}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function exportCSV(){let csv='Sport,Name,Position,Year,Status,Salary,Scholarship,Kills,Blocks,Aces,Digs,Hitting,Points,Rebounds,Assists,Steals,FG,Notes
