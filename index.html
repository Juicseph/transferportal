let generatedGuides = {};
let currentRecruit = null;
let isGenerating = false;
let filter = { pos: 'all', status: 'all' };

function getFilteredRecruits() {
  return RECRUITS.filter(r => {
    if (filter.pos !== 'all' && r.pos !== filter.pos) return false;
    if (filter.status === 'hot' && !r.status.includes('🔥')) return false;
    if (filter.status === 'neutral' && !r.status.includes('😐')) return false;
    return true;
  });
}

function renderRoster() {
  const grid = document.getElementById('rosterGrid');
  const recruits = getFilteredRecruits();
  grid.innerHTML = recruits.map(r => {
    const done = generatedGuides[r.name];
    const gen = isGenerating && currentRecruit === r.name;
    const statusClass = done ? 'generated' : gen ? 'generating' : '';
    const interestBadge = r.interest && r.interest !== '—' ? `<span class="badge badge-interest">⭐ ${r.interest}/5</span>` : '';
    const statusBadge = r.status.includes('🔥') ? '<span class="badge badge-hot">🔥 Hot</span>' : '<span class="badge badge-neutral">😐 Neutral</span>';
    const posBadge = r.pos && r.pos !== '—' ? `<span class="badge badge-pos">${r.pos}</span>` : '';
    const genStatus = done ? '<div class="card-status status-done">✅ Guide ready</div>' : gen ? '<div class="card-status status-generating"><span class="spinner"></span>Generating...</div>' : '';
    return `<div class="recruit-card ${statusClass}" onclick="selectRecruit('${r.name.replace(/'/g,"\\'")}')">
      <div class="card-name">${r.name}</div>
      <div class="card-meta">${posBadge}${interestBadge}${statusBadge}</div>
      <div style="font-size:11px;color:#5a7ab0;margin-top:3px">${r.club}</div>
      ${genStatus}
    </div>`;
  }).join('');
}

async function selectRecruit(name) {
  const recruit = RECRUITS.find(r => r.name === name);
  if (!recruit) return;
  currentRecruit = name;

  document.getElementById('outputArea').style.display = 'block';
  document.getElementById('outputTitle').textContent = `Call Guide: ${name}`;
  document.getElementById('outputTabs').innerHTML = '';
  document.getElementById('dlBtn').style.display = 'none';
  document.getElementById('allDownloads').innerHTML = '';

  if (generatedGuides[name]) {
    document.getElementById('guideOutput').textContent = generatedGuides[name];
    document.getElementById('dlBtn').style.display = 'inline-block';
    document.getElementById('progressBar').style.display = 'none';
    return;
  }

  await generateGuide(recruit);
}

async function generateGuide(recruit) {
  isGenerating = true;
  currentRecruit = recruit.name;
  renderRoster();

  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('progressFill').style.width = '10%';
  document.getElementById('guideOutput').textContent = 'Generating personalized call guide...';
  document.getElementById('dlBtn').style.display = 'none';

  const hasAnswers = recruit.q1 || recruit.q2 || recruit.q3;
  const answersSection = hasAnswers ? `
Her questionnaire answers:
Q1 responses: ${recruit.q1}
Q2 responses: ${recruit.q2}
Q3 responses: ${recruit.q3}
` : `(No questionnaire answers on file yet)`;

  const prompt = `You are the Fresno State Volleyball recruiting staff writing a personalized call guide for the June 15, 2027 recruiting calls. 

Create a 2-page maximum call guide for this recruit. Make it sound exciting, comforting, and a no-brainer decision. Be warm, personal, and enthusiastic. Reference their actual answers where possible to show you were listening.

RECRUIT INFO:
Name: ${recruit.name}
Position: ${recruit.pos}
Interest Level: ${recruit.interest}/5
Status: ${recruit.status}
Phone: ${recruit.phone}
Email: ${recruit.email}
Club: ${recruit.club}
${answersSection}

FORMAT THE GUIDE EXACTLY LIKE THIS (use these exact section headers):

Fresno State Volleyball - 2027 Recruit Call Guide
Recruit: ${recruit.name} | Interest Level: ${recruit.interest}/5
Position: ${recruit.pos}
Phone: ${recruit.phone}
Email: ${recruit.email}
Club: ${recruit.club}

CALL GOALS:
- (3-4 bullet goals personalized to this recruit based on their answers and background)

TOP 5 QUESTIONS WITH FOLLOW-UPS:
1. (Question referencing something specific from their answers)
   - If unsure: (follow-up)
   - If clear: (deeper follow-up)

2. (Question about what they're looking for, referencing their stated key factors)
   - If unsure: ...
   - If clear: ...

3. (Question about their career/academic interests they mentioned)
   - If unsure: ...
   - If clear: ...

4. (Question about what makes them different / their stated superpower)
   - If unsure: ...
   - If clear: ...

5. (Closing interest question - what would make this a 100% yes)
   - If unsure: ...
   - If clear: ...

NEXT STEP ASK:
(2-3 sentences that are warm and personal, referencing something specific about them, building excitement about their future at Fresno State. Make it feel like a no-brainer.)

HOW FRESNO STATE WILL SUPPORT ${recruit.name.split(' ')[0].toUpperCase()}:
- (4-5 bullet points personalized to their stated goals, interests, and volleyball style)

FUN CLOSING QUESTIONS:
- (3 fun, lighthearted questions that connect to something they mentioned)

Keep the tone exciting, warm, genuine, and make Fresno State feel like home. Reference their specific answers to show you were truly listening. This should feel like it was written just for them.`;

  try {
    document.getElementById('progressFill').style.width = '30%';
    
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: [{ role: "user", content: prompt }]
      })
    });

    document.getElementById('progressFill').style.width = '80%';
    const data = await response.json();
    const text = data.content?.[0]?.text || 'Error generating guide.';
    
    generatedGuides[recruit.name] = text;
    document.getElementById('guideOutput').textContent = text;
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('dlBtn').style.display = 'inline-block';
    
    setTimeout(() => { document.getElementById('progressBar').style.display = 'none'; }, 600);
    
    document.getElementById('statGenerated').textContent = Object.keys(generatedGuides).length;
    
    const hasAll = RECRUITS.length === Object.keys(generatedGuides).length;
    document.getElementById('btnDownloadAll').style.display = hasAll ? 'inline-block' : 'none';

  } catch(err) {
    document.getElementById('guideOutput').textContent = 'Error: ' + err.message;
  }

  isGenerating = false;
  renderRoster();
}

async function generateAll() {
  const btn = document.getElementById('btnGenerateAll');
  btn.disabled = true;
  document.getElementById('outputArea').style.display = 'block';
  
  const recruits = getFilteredRecruits();
  
  for (let i = 0; i < recruits.length; i++) {
    const r = recruits[i];
    if (generatedGuides[r.name]) continue;
    
    document.getElementById('outputTitle').textContent = `Generating: ${r.name} (${i+1}/${recruits.length})`;
    document.getElementById('guideOutput').textContent = `Generating call guide for ${r.name}...`;
    await generateGuide(r);
    await new Promise(res => setTimeout(res, 800));
  }
  
  btn.disabled = false;
  document.getElementById('outputTitle').textContent = 'All Guides Generated!';
  document.getElementById('btnDownloadAll').style.display = 'inline-block';
  renderAllDownloadButtons();
}

function renderAllDownloadButtons() {
  const container = document.getElementById('allDownloads');
  container.innerHTML = Object.keys(generatedGuides).map(name => 
    `<button class="mini-download ready" onclick="downloadPDF('${name.replace(/'/g,"\\'")}')">⬇ ${name}</button>`
  ).join('');
}

function downloadPDF(name) {
  const text = generatedGuides[name];
  if (!text) return;
  
  const safeName = name.replace(/[^a-z0-9]/gi, '_');
  const content = `%PDF-1.4
1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj
2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>endobj
3 0 obj<</Type/Page/MediaBox[0 0 612 792]/Contents 4 0 R/Resources<</Font<</F1<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>>>>>>/Parent 2 0 R>>endobj`;
  
  // Use a text file as PDF-like download since we're in browser
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Fresno_State_VB_Call_Guide_${safeName}_June15.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCurrentPDF() {
  if (!currentRecruit || !generatedGuides[currentRecruit]) return;
  downloadPDF(currentRecruit);
}

function downloadAllPDFs() {
  Object.keys(generatedGuides).forEach((name, i) => {
    setTimeout(() => downloadPDF(name), i * 300);
  });
}

// Filter listeners
document.getElementById('posFilter').addEventListener('change', function() {
  filter.pos = this.value;
  renderRoster();
});

document.getElementById('statusFilter').addEventListener('change', function() {
  filter.status = this.value;
  renderRoster();
});

renderRoster();
</script>
