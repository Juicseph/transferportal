<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster GM Command Center</title>
<style>
:root{--bg:#f5f7fb;--ink:#101950;--muted:#64748b;--card:#fff;--line:#e2e8f0;--navy:#081524;--navy2:#10263a;--blue:#1769ff;--green:#16a34a;--yellow:#f59e0b;--red:#dc2626;--vb:#7c3aed;--bb:#f97316;--shadow:0 10px 30px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}.layout{display:grid;grid-template-columns:230px 1fr;min-height:100vh}.sidebar{background:var(--navy);color:#dbeafe;padding:22px 16px;position:sticky;top:0;height:100vh}.brand{font-size:19px;font-weight:950;margin-bottom:24px;line-height:1.05}.brand small{display:block;color:#93c5fd;font-size:11px;letter-spacing:.13em;text-transform:uppercase;margin-top:6px}.nav{padding:12px;border-radius:12px;margin:6px 0;color:#cbd5e1;font-weight:800}.nav.active,.nav:hover{background:#132c44;color:#fff}.main{padding:24px;min-width:0}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}.eyebrow{font-size:12px;color:var(--muted);font-weight:900;letter-spacing:.12em;text-transform:uppercase}.title{font-size:31px;line-height:1.05;margin:4px 0 6px}.sub{color:var(--muted);margin:0}.top-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{border:0;border-radius:12px;padding:10px 14px;background:var(--blue);color:white;font-weight:900;box-shadow:0 8px 18px rgba(23,105,255,.18)}.btn.secondary{background:white;color:var(--ink);border:1px solid var(--line);box-shadow:none}.btn.danger{background:var(--red)}.btn.small{font-size:12px;padding:7px 10px;border-radius:10px}.toggle{display:inline-grid;grid-template-columns:1fr 1fr;background:#eaf0f8;border:1px solid var(--line);padding:4px;border-radius:14px}.toggle button{border:0;background:transparent;padding:8px 12px;border-radius:10px;color:var(--muted);font-weight:950}.toggle button.active{background:white;color:var(--ink);box-shadow:0 4px 12px rgba(15,23,42,.08)}.kpis{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:12px;margin-bottom:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);min-width:0}.kpi label{display:block;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.kpi b{font-size:23px;display:block;margin:7px 0 2px}.kpi small{color:var(--muted)}.toolbar{display:grid;grid-template-columns:1.4fr 160px 160px 160px auto;gap:10px;margin-bottom:14px}.field{width:100%;height:42px;border:1px solid var(--line);border-radius:12px;background:white;color:var(--ink);padding:0 12px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid var(--line);background:white;border-radius:999px;padding:8px 12px;color:var(--muted);font-weight:900}.tab.active{background:var(--navy);border-color:var(--navy);color:white}.content{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(280px,.9fr);gap:14px}.panel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.panel-head h3{margin:0;font-size:17px}.table-wrap{overflow:auto;border-radius:12px;border:1px solid var(--line)}table{width:100%;border-collapse:collapse;background:white;font-size:13px}th,td{padding:10px 9px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:#f8fafc}tr:hover td{background:#f8fbff}.num{text-align:right}.player-cell{display:flex;align-items:center;gap:9px;font-weight:900}.avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#dbeafe;color:#17468a;font-weight:950}.tag{display:inline-flex;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;background:#f1f5f9;color:#334155}.tag.vb{background:#f3e8ff;color:#6d28d9}.tag.bb{background:#ffedd5;color:#c2410c}.tag.active{background:#dcfce7;color:#166534}.tag.target{background:#dbeafe;color:#1d4ed8}.tag.injured{background:#fee2e2;color:#991b1b}.side-stack{display:grid;gap:14px}.bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--green);transition:.25s}.bar.warn span{background:var(--yellow)}.bar.bad span{background:var(--red)}.mini-list{display:grid;gap:10px}.mini-row{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line);border-radius:14px;background:#fbfdff;padding:10px}.mini-row span{font-size:12px;color:var(--muted)}.empty{padding:28px;text-align:center;color:var(--muted)}.modal-bg{position:fixed;inset:0;background:rgba(2,6,23,.45);display:none;z-index:20}.modal-bg.open{display:block}.modal{position:fixed;right:22px;top:22px;width:560px;max-width:calc(100vw - 44px);max-height:calc(100vh - 44px);overflow:auto;background:white;border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.25);padding:18px;display:none;z-index:21}.modal.open{display:block}.modal h2{margin:0 0 12px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}.form-grid label{display:block;font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}.form-grid input,.form-grid select,.form-grid textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;color:var(--ink);background:white}.form-grid textarea{min-height:78px}.modal-actions{display:flex;justify-content:space-between;gap:10px;margin-top:14px}.modal-actions div{display:flex;gap:8px}.toast{position:fixed;right:22px;bottom:22px;background:var(--navy);color:white;border-radius:12px;padding:12px 14px;opacity:0;transform:translateY(8px);transition:.2s;z-index:30}.toast.show{opacity:1;transform:translateY(0)}.print-banner{display:none}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.sidebar{height:auto;position:relative;display:flex;gap:6px;flex-wrap:wrap}.brand{width:100%;margin-bottom:8px}.content,.kpis{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}.main{padding:16px}}@media(max-width:700px){.top{display:block}.top-actions{justify-content:flex-start;margin-top:12px}.toolbar,.form-grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.title{font-size:25px}.modal{left:12px;right:12px;top:12px;width:auto;max-width:none}}
@media print{body{background:white}.layout{display:block}.sidebar,.top-actions,.toolbar,.tabs,.btn,.modal,.modal-bg{display:none!important}.main{padding:0}.card{box-shadow:none;break-inside:avoid}.content{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(3,1fr)}.print-banner{display:block;margin-bottom:12px}.table-wrap{overflow:visible}}
</style>
</head>
<body>
<div class="modal-bg" id="modalBg"></div><div class="modal" id="modal"><h2 id="modalTitle">Edit</h2><div id="modalBody"></div></div><div class="toast" id="toast"></div>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Roster GM<small>Volleyball + Basketball</small></div>
    <div class="nav active" data-view="dashboard">Dashboard</div>
    <div class="nav" data-view="roster">Roster</div>
    <div class="nav" data-view="stats">Stats</div>
    <div class="nav" data-view="money">Money / Budget</div>
    <div class="nav" data-view="presentation">Presentation</div>
  </aside>
  <main class="main">
    <div class="print-banner"><h1>Roster GM Presentation</h1></div>
    <section class="top">
      <div><div class="eyebrow">GM Command Center</div><h1 class="title" id="pageTitle">Team Dashboard</h1><p class="sub">Clean roster, salary/NIL budget, scholarships, and sport-specific stats.</p></div>
      <div class="top-actions"><div class="toggle"><button id="vbBtn">Volleyball</button><button id="bbBtn">Basketball</button></div><button class="btn" id="addBtn">+ Add Player</button><button class="btn secondary" id="budgetBtn">Edit Budget</button></div>
    </section>
    <section class="kpis" id="kpis"></section>
    <section class="tabs" id="tabs"></section>
    <section class="toolbar"><input id="search" class="field" placeholder="Search player, position, notes..."><select id="posFilter" class="field"></select><select id="statusFilter" class="field"><option value="all">All Statuses</option><option>Active</option><option>Target</option><option>Injured</option><option>Redshirt</option></select><select id="sortBy" class="field"><option value="value">Best Value</option><option value="salary">Highest Salary</option><option value="stat">Top Main Stat</option><option value="name">Name A-Z</option></select><button class="btn secondary" id="csvBtn">Export CSV</button></section>
    <section class="content"><div class="card"><div class="panel-head"><h3 id="tableTitle">Roster</h3><button class="btn small secondary" id="bulkStatsBtn">Add Stats</button></div><div class="table-wrap" id="tableWrap"></div></div><aside class="side-stack"><div class="card" id="budgetCard"></div><div class="card" id="insightCard"></div><div class="card" id="presentationCard"></div></aside></section>
  </main>
</div>
<script>
(function(){
const $=id=>document.getElementById(id);
const starter={sport:'volleyball',budget:{volleyball:250000,basketball:350000},scholarships:{volleyball:12,basketball:13},players:[
{id:1,sport:'volleyball',name:'Avery Johnson',pos:'OH',year:'JR',status:'Active',salary:22000,scholarship:1,notes:'Six-rotation pin. High serve receive value.',stats:{kills:315,blocks:42,aces:31,digs:255,hitting:.284,points:388,rebounds:0,assists:0,steals:0,fg:0}},
{id:2,sport:'volleyball',name:'Mia Torres',pos:'S',year:'SO',status:'Active',salary:18500,scholarship:1,notes:'Tempo setter. Strong connection with middles.',stats:{kills:62,blocks:38,aces:28,digs:210,hitting:.310,points:128,rebounds:0,assists:945,steals:0,fg:0}},
{id:3,sport:'volleyball',name:'Kendall Lee',pos:'MB',year:'SR',status:'Active',salary:20000,scholarship:1,notes:'Best blocker, efficient attacker.',stats:{kills:190,blocks:118,aces:12,digs:45,hitting:.366,points:320,rebounds:0,assists:8,steals:0,fg:0}},
{id:4,sport:'basketball',name:'Jordan Carter',pos:'G',year:'JR',status:'Active',salary:42000,scholarship:1,notes:'Lead guard. Primary creator.',stats:{points:16.8,rebounds:4.1,assists:5.7,steals:1.6,fg:.461,kills:0,blocks:0,aces:0,digs:0,hitting:0}},
{id:5,sport:'basketball',name:'Sam Rivera',pos:'F',year:'SO',status:'Target',salary:36000,scholarship:1,notes:'Switchable forward with shooting upside.',stats:{points:13.2,rebounds:7.4,assists:2.1,steals:.9,fg:.498,kills:0,blocks:0,aces:0,digs:0,hitting:0}},
{id:6,sport:'basketball',name:'Malik Brooks',pos:'C',year:'SR',status:'Active',salary:38000,scholarship:1,notes:'Rim protection and offensive glass.',stats:{points:10.6,rebounds:9.1,assists:1.4,steals:.7,fg:.552,kills:0,blocks:1.9,aces:0,digs:0,hitting:0}}
]};
let state=load();let view='dashboard';
function load(){try{let raw=localStorage.getItem('rosterGMUsableV2');if(raw){let parsed=JSON.parse(raw);if(parsed.players&&parsed.budget)return parsed}}catch(e){}return JSON.parse(JSON.stringify(starter))}
function save(){localStorage.setItem('rosterGMUsableV2',JSON.stringify(state))}
function money(n){return Number(n||0).toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0})}
function n(v){return Number(v||0)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function sportName(){return state.sport==='volleyball'?'Volleyball':'Basketball'}
function players(){return state.players.filter(p=>p.sport===state.sport)}
function budget(){return n(state.budget[state.sport])}
function ships(){return n(state.scholarships[state.sport])}
function spent(){return players().reduce((s,p)=>s+n(p.salary),0)}
function usedShips(){return players().reduce((s,p)=>s+n(p.scholarship),0)}
function mainStat(p){return state.sport==='volleyball'?n(p.stats.points||p.stats.kills+n(p.stats.blocks)+n(p.stats.aces)):n(p.stats.points)}
function value(p){return Math.round((mainStat(p)*1000)/((n(p.salary)/1000)+1))}
function posList(){return state.sport==='volleyball'?['All Positions','OH','MB','OPP','S','L','DS']:['All Positions','G','F','C','PG','SG','SF','PF']}
function filtered(){let q=$('search').value.toLowerCase(),pos=$('posFilter').value,status=$('statusFilter').value,sort=$('sortBy').value;let rows=players().filter(p=>(p.name+' '+p.pos+' '+p.year+' '+p.status+' '+p.notes).toLowerCase().includes(q)&&(pos==='All Positions'||p.pos===pos)&&(status==='all'||p.status===status));rows.sort((a,b)=>sort==='salary'?n(b.salary)-n(a.salary):sort==='name'?a.name.localeCompare(b.name):sort==='stat'?mainStat(b)-mainStat(a):value(b)-value(a));return rows}
function render(){renderTop();renderKpis();renderTabs();renderPositionOptions();renderContent()}
function renderTop(){$('vbBtn').classList.toggle('active',state.sport==='volleyball');$('bbBtn').classList.toggle('active',state.sport==='basketball');$('pageTitle').textContent=sportName()+' GM Dashboard'}
function renderPositionOptions(){let current=$('posFilter').value||'All Positions';$('posFilter').innerHTML=posList().map(p=>`<option>${p}</option>`).join('');$('posFilter').value=posList().includes(current)?current:'All Positions'}
function renderKpis(){let ps=players(),sp=spent(),left=budget()-sp,top=[...ps].sort((a,b)=>value(b)-value(a))[0];$('kpis').innerHTML=`<div class="card kpi"><label>Roster</label><b>${ps.length}</b><small>${sportName()} players</small></div><div class="card kpi"><label>Budget Used</label><b>${money(sp)}</b><small>${budget()?((sp/budget())*100).toFixed(1):0}% of ${money(budget())}</small></div><div class="card kpi"><label>Budget Left</label><b style="color:${left<0?'var(--red)':'var(--green)'}">${money(left)}</b><small>${left<0?'Over budget':'Available'}</small></div><div class="card kpi"><label>Scholarships</label><b>${usedShips()}/${ships()}</b><small>Used / available</small></div><div class="card kpi"><label>Best Value</label><b>${top?esc(top.name.split(' ')[0]):'-'}</b><small>${top?value(top)+' score':'Add players'}</small></div>`}
function renderTabs(){let labels={dashboard:'Overview',roster:'Roster Builder',stats:'Stats + Value',money:'Money / Budget',presentation:'Presentation'};$('tabs').innerHTML=Object.keys(labels).map(k=>`<button class="tab ${view===k?'active':''}" data-tab="${k}">${labels[k]}</button>`).join('');document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{view=b.dataset.tab;syncNav();renderContent();renderTabs()})}
function syncNav(){document.querySelectorAll('.nav').forEach(nv=>nv.classList.toggle('active',nv.dataset.view===view))}
function renderContent(){let rows=filtered();$('tableTitle').textContent=view==='stats'?'Stats Board':view==='money'?'Money Board':view==='presentation'?'Presentation Roster':'Roster Board';$('tableWrap').innerHTML=view==='stats'?statsTable(rows):rosterTable(rows);renderBudgetCard();renderInsightCard(rows);renderPresentationCard();bindRows()}
function rosterTable(rows){if(!rows.length)return '<div class="empty">No players found. Click + Add Player to build your roster.</div>';return `<table><thead><tr><th>Player</th><th>Sport</th><th>Pos</th><th>Year</th><th>Status</th><th class="num">Salary/NIL</th><th class="num">Sch</th><th class="num">Main Stat</th><th class="num">Value</th></tr></thead><tbody>${rows.map(p=>`<tr data-id="${p.id}"><td><div class="player-cell"><span class="avatar">${esc(p.name[0]||'?')}</span>${esc(p.name)}</div></td><td><span class="tag ${p.sport==='volleyball'?'vb':'bb'}">${p.sport==='volleyball'?'VB':'BB'}</span></td><td>${esc(p.pos)}</td><td>${esc(p.year)}</td><td><span class="tag ${String(p.status).toLowerCase()}">${esc(p.status)}</span></td><td class="num">${money(p.salary)}</td><td class="num">${n(p.scholarship)}</td><td class="num">${mainStat(p)}</td><td class="num"><b>${value(p)}</b></td></tr>`).join('')}</tbody></table>`}
function statsTable(rows){if(!rows.length)return '<div class="empty">No players found. Add players or clear filters.</div>';let vb=state.sport==='volleyball';return `<table><thead><tr><th>Player</th><th>Pos</th>${vb?'<th class="num">Kills</th><th class="num">Blocks</th><th class="num">Aces</th><th class="num">Digs</th><th class="num">Hit %</th><th class="num">Points</th>':'<th class="num">PTS</th><th class="num">REB</th><th class="num">AST</th><th class="num">STL</th><th class="num">FG%</th>'}<th class="num">Value</th></tr></thead><tbody>${rows.map(p=>`<tr data-id="${p.id}"><td><div class="player-cell"><span class="avatar">${esc(p.name[0]||'?')}</span>${esc(p.name)}</div></td><td>${esc(p.pos)}</td>${vb?`<td class="num">${n(p.stats.kills)}</td><td class="num">${n(p.stats.blocks)}</td><td class="num">${n(p.stats.aces)}</td><td class="num">${n(p.stats.digs)}</td><td class="num">${n(p.stats.hitting).toFixed(3)}</td><td class="num">${mainStat(p)}</td>`:`<td class="num">${n(p.stats.points)}</td><td class="num">${n(p.stats.rebounds)}</td><td class="num">${n(p.stats.assists)}</td><td class="num">${n(p.stats.steals)}</td><td class="num">${n(p.stats.fg).toFixed(3)}</td>`}<td class="num"><b>${value(p)}</b></td></tr>`).join('')}</tbody></table>`}
function renderBudgetCard(){let sp=spent(),u=budget()?sp/budget()*100:0,cls=u>100?'bad':u>85?'warn':'';$('budgetCard').innerHTML=`<div class="panel-head"><h3>Budget Tracker</h3><button class="btn small secondary" id="sideBudget">Edit</button></div><div class="bar ${cls}"><span style="width:${Math.min(100,u)}%"></span></div><p class="muted">${money(sp)} used of ${money(budget())}</p><div class="mini-list"><div class="mini-row"><div><b>Remaining</b><br><span>Current sport</span></div><b>${money(budget()-sp)}</b></div><div class="mini-row"><div><b>Scholarships</b><br><span>Used / available</span></div><b>${usedShips()} / ${ships()}</b></div></div>`;$('sideBudget').onclick=openBudget}
function renderInsightCard(rows){let top=[...rows].sort((a,b)=>value(b)-value(a)).slice(0,3);$('insightCard').innerHTML=`<div class="panel-head"><h3>GM Insights</h3></div><div class="mini-list">${top.map(p=>`<div class="mini-row"><div><b>${esc(p.name)}</b><br><span>${esc(p.pos)} • ${money(p.salary)} • ${mainStat(p)} stat</span></div><b>${value(p)}</b></div>`).join('')||'<p class="muted">No players match filters.</p>'}</div>`}
function renderPresentationCard(){$('presentationCard').innerHTML=`<div class="panel-head"><h3>Presentation</h3></div><p class="muted">Use Presentation tab, then Print / PDF for a clean staff meeting view.</p><div class="top-actions"><button class="btn small" id="printBtn">Print / PDF</button><button class="btn small secondary" id="resetBtn">Reset Demo</button></div>`;$('printBtn').onclick=()=>window.print();$('resetBtn').onclick=()=>{if(confirm('Reset demo data?')){localStorage.removeItem('rosterGMUsableV2');state=load();view='dashboard';syncNav();render();toast('Reset complete')}}}
function openPlayer(id){let existing=!!id;let p=existing?state.players.find(x=>x.id===Number(id)):blankPlayer();$('modalTitle').textContent=existing?'Edit Player':'Add Player';let vb=p.sport==='volleyball';$('modalBody').innerHTML=`<div class="form-grid"><div class="full"><label>Name</label><input id="pName" value="${esc(p.name)}" placeholder="Player name"></div><div><label>Sport</label><select id="pSport"><option value="volleyball">Volleyball</option><option value="basketball">Basketball</option></select></div><div><label>Position</label><select id="pPos">${(p.sport==='volleyball'?['OH','MB','OPP','S','L','DS']:['G','F','C','PG','SG','SF','PF']).map(x=>`<option>${x}</option>`).join('')}</select></div><div><label>Year</label><select id="pYear"><option>FR</option><option>SO</option><option>JR</option><option>SR</option><option>Target</option></select></div><div><label>Status</label><select id="pStatus"><option>Active</option><option>Target</option><option>Injured</option><option>Redshirt</option></select></div><div><label>Salary / NIL</label><input id="pSalary" type="number" value="${n(p.salary)}"></div><div><label>Scholarship</label><input id="pShip" type="number" step="0.25" value="${n(p.scholarship)}"></div><div class="full"><label>Notes</label><textarea id="pNotes" placeholder="Role, strengths, recruiting notes...">${esc(p.notes)}</textarea></div><div class="full"><b>${vb?'Volleyball Stats':'Basketball Stats'}</b></div><div><label>${vb?'Kills':'Points / Game'}</label><input id="s1" type="number" step="0.001" value="${vb?n(p.stats.kills):n(p.stats.points)}"></div><div><label>${vb?'Blocks':'Rebounds / Game'}</label><input id="s2" type="number" step="0.001" value="${vb?n(p.stats.blocks):n(p.stats.rebounds)}"></div><div><label>${vb?'Aces':'Assists / Game'}</label><input id="s3" type="number" step="0.001" value="${vb?n(p.stats.aces):n(p.stats.assists)}"></div><div><label>${vb?'Digs':'Steals / Game'}</label><input id="s4" type="number" step="0.001" value="${vb?n(p.stats.digs):n(p.stats.steals)}"></div><div><label>${vb?'Hitting %':'FG %'}</label><input id="s5" type="number" step="0.001" value="${vb?n(p.stats.hitting):n(p.stats.fg)}"></div></div><div class="modal-actions"><button class="btn danger" id="deletePlayer" ${existing?'':'style="visibility:hidden"'}>Delete</button><div><button class="btn secondary" id="cancelPlayer">Cancel</button><button class="btn" id="savePlayer">Save</button></div></div>`;$('pSport').value=p.sport;$('pPos').value=p.pos;$('pYear').value=p.year;$('pStatus').value=p.status;$('pSport').onchange=()=>{p.sport=$('pSport').value;p.pos=p.sport==='volleyball'?'OH':'G';openTempPlayer(p,existing)};$('cancelPlayer').onclick=closeModal;$('deletePlayer').onclick=()=>{state.players=state.players.filter(x=>x.id!==p.id);save();closeModal();render();toast('Player deleted')};$('savePlayer').onclick=()=>savePlayerForm(p,existing);openModal()}
function openTempPlayer(p,existing){closeModal();setTimeout(()=>{state._temp=p;openPlayerTemp(p,existing)},0)}
function openPlayerTemp(p,existing){let id=p.id;let old=state.players.find(x=>x.id===id);if(old){Object.assign(old,p);openPlayer(id)}else{let temp=p;openPlayer();}}
function blankPlayer(){return{id:Date.now(),sport:state.sport,name:'',pos:state.sport==='volleyball'?'OH':'G',year:'FR',status:'Active',salary:0,scholarship:0,notes:'',stats:{kills:0,blocks:0,aces:0,digs:0,hitting:0,points:0,rebounds:0,assists:0,steals:0,fg:0}}}
function savePlayerForm(p,existing){p.name=$('pName').value.trim()||'Unnamed Player';p.sport=$('pSport').value;p.pos=$('pPos').value;p.year=$('pYear').value;p.status=$('pStatus').value;p.salary=n($('pSalary').value);p.scholarship=n($('pShip').value);p.notes=$('pNotes').value;p.stats=p.stats||{};if(p.sport==='volleyball'){p.stats.kills=n($('s1').value);p.stats.blocks=n($('s2').value);p.stats.aces=n($('s3').value);p.stats.digs=n($('s4').value);p.stats.hitting=n($('s5').value);p.stats.points=p.stats.kills+p.stats.blocks+p.stats.aces}else{p.stats.points=n($('s1').value);p.stats.rebounds=n($('s2').value);p.stats.assists=n($('s3').value);p.stats.steals=n($('s4').value);p.stats.fg=n($('s5').value)}if(!existing)state.players.push(p);state.sport=p.sport;save();closeModal();render();toast('Player saved')}
function openBudget(){$('modalTitle').textContent='Edit Budget / Scholarships';$('modalBody').innerHTML=`<div class="form-grid"><div><label>Volleyball Budget</label><input id="bVB" type="number" value="${n(state.budget.volleyball)}"></div><div><label>Basketball Budget</label><input id="bBB" type="number" value="${n(state.budget.basketball)}"></div><div><label>Volleyball Scholarships</label><input id="sVB" type="number" step="0.25" value="${n(state.scholarships.volleyball)}"></div><div><label>Basketball Scholarships</label><input id="sBB" type="number" step="0.25" value="${n(state.scholarships.basketball)}"></div></div><div class="modal-actions"><span></span><div><button class="btn secondary" id="cancelBudget">Cancel</button><button class="btn" id="saveBudget">Save</button></div></div>`;$('cancelBudget').onclick=closeModal;$('saveBudget').onclick=()=>{state.budget.volleyball=n($('bVB').value);state.budget.basketball=n($('bBB').value);state.scholarships.volleyball=n($('sVB').value);state.scholarships.basketball=n($('sBB').value);save();closeModal();render();toast('Budget saved')};openModal()}
function openModal(){$('modalBg').classList.add('open');$('modal').classList.add('open')}function closeModal(){$('modalBg').classList.remove('open');$('modal').classList.remove('open')}
function bindRows(){document.querySelectorAll('[data-id]').forEach(r=>r.onclick=()=>openPlayer(r.dataset.id))}
function exportCsv(){let header=['Sport','Name','Position','Year','Status','Salary','Scholarship','Kills','Blocks','Aces','Digs','Hitting','Points','Rebounds','Assists','Steals','FG','Notes'];let rows=state.players.map(p=>[p.sport,p.name,p.pos,p.year,p.status,p.salary,p.scholarship,p.stats.kills,p.stats.blocks,p.stats.aces,p.stats.digs,p.stats.hitting,p.stats.points,p.stats.rebounds,p.stats.assists,p.stats.steals,p.stats.fg,p.notes]);let csv=[header,...rows].map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('
');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='roster-gm-command-center.csv';a.click();URL.revokeObjectURL(a.href);toast('CSV exported')}
function toast(msg){$('toast').textContent=msg;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1500)}
function boot(){document.querySelectorAll('.nav').forEach(nv=>nv.onclick=()=>{view=nv.dataset.view;syncNav();renderContent();renderTabs()});$('vbBtn').onclick=()=>{state.sport='volleyball';render()};$('bbBtn').onclick=()=>{state.sport='basketball';render()};$('addBtn').onclick=()=>openPlayer();$('budgetBtn').onclick=openBudget;$('modalBg').onclick=closeModal;$('search').oninput=renderContent;$('posFilter').onchange=renderContent;$('statusFilter').onchange=renderContent;$('sortBy').onchange=renderContent;$('csvBtn').onclick=exportCsv;$('bulkStatsBtn').onclick=()=>{view='stats';syncNav();render();toast('Click a player to edit stats')};render()}
document.readyState==='loading'?document.addEventListener('DOMContentLoaded',boot):boot();
})();
</script>
</body>
</html>
