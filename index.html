<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pac-12 Conference Scheduler Prototype</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #b91c1c;
      --accent-dark: #7f1d1d;
      --good: #047857;
      --warn: #d97706;
      --bad: #dc2626;
      --blue: #2563eb;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(185,28,28,.14), transparent 34%), var(--bg);
      color: var(--ink);
    }

    header {
      padding: 28px;
      background: linear-gradient(135deg, #111827, #7f1d1d);
      color: white;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    header h1 { margin: 0 0 6px; font-size: clamp(26px, 4vw, 44px); letter-spacing: -0.04em; }
    header p { margin: 0; color: rgba(255,255,255,.78); max-width: 820px; }
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(185, 28, 28, 0.2);
      transition: transform .15s ease, opacity .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button.secondary { background: #111827; box-shadow: none; }
    button.ghost { background: white; color: #111827; box-shadow: none; border: 1px solid var(--line); }
    button.warn { background: var(--warn); }
    button.bad { background: var(--bad); }
    button.small { padding: 7px 10px; font-size: 12px; }

    .app { display: grid; grid-template-columns: 280px 1fr; gap: 22px; padding: 22px; }
    nav {
      position: sticky;
      top: 16px;
      align-self: start;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.6);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    nav button {
      width: 100%;
      margin: 4px 0;
      text-align: left;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      border-radius: 12px;
    }
    nav button.active { background: #111827; color: white; }

    main { min-width: 0; }
    section { display: none; }
    section.active { display: block; }

    .grid { display: grid; gap: 16px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(229,231,235,.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .card h2, .card h3 { margin-top: 0; letter-spacing: -0.03em; }
    .muted { color: var(--muted); }
    .pill { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:5px 9px; font-size:12px; font-weight:800; background:#f3f4f6; color:#374151; }
    .pill.good { background:#ecfdf5; color:var(--good); }
    .pill.warn { background:#fffbeb; color:var(--warn); }
    .pill.bad { background:#fef2f2; color:var(--bad); }
    .pill.blue { background:#eff6ff; color:var(--blue); }

    label { display:block; font-weight:800; font-size:12px; color:#374151; margin: 8px 0 5px; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      color: var(--ink);
      outline: none;
    }
    textarea { min-height: 86px; resize: vertical; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; border-bottom: 1px solid var(--line); padding: 10px; vertical-align: top; }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    tr.locked { background: #fffbeb; }

    .team-dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-right:7px; vertical-align:-1px; border:1px solid rgba(0,0,0,.15); }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:end; margin-bottom: 14px; }
    .toolbar > div { min-width: 150px; }
    .stat { padding: 14px; border-radius: 16px; background: #f9fafb; border: 1px solid var(--line); }
    .stat strong { display:block; font-size: 26px; letter-spacing:-.04em; }

    .calendar { display:grid; grid-template-columns: repeat(7, minmax(110px, 1fr)); gap: 10px; }
    .day { min-height: 130px; background:#fff; border:1px solid var(--line); border-radius:16px; padding:10px; }
    .day strong { font-size: 13px; }
    .game-chip { margin-top:7px; border-radius:12px; padding:8px; color:white; font-size:12px; cursor:pointer; box-shadow: 0 8px 16px rgba(15,23,42,.1); }
    .game-chip.locked::after { content:' 🔒'; }

    .warnings { display:grid; gap:8px; }
    .warning { padding:10px 12px; border-radius: 14px; background:#fffbeb; border:1px solid #fde68a; color:#92400e; }
    .warning.bad { background:#fef2f2; border-color:#fecaca; color:#991b1b; }

    .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(17,24,39,.45); z-index:50; align-items:center; justify-content:center; padding:20px; }
    .modal-backdrop.open { display:flex; }
    .modal { width:min(720px, 96vw); max-height:90vh; overflow:auto; background:white; border-radius:24px; padding:20px; box-shadow:0 30px 80px rgba(0,0,0,.25); }
    .row { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:12px; }
    .footer-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:16px; flex-wrap:wrap; }

    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
      nav { position: static; }
      .grid.two, .grid.three, .row { grid-template-columns: 1fr; }
      header { grid-template-columns: 1fr; }
      .calendar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Pac-12 Conference Scheduler</h1>
      <p>A single-file prototype for league-wide scheduling with teams, travel partners, venue conflicts, blackout dates, manual locks, exports, and browser-based saving.</p>
    </div>
    <div class="header-actions">
      <button class="ghost" onclick="saveState()">Save</button>
      <button class="ghost" onclick="loadState(true)">Reload Saved</button>
      <button class="ghost" onclick="resetDemo()">Reset Demo</button>
    </div>
  </header>

  <div class="app">
    <nav id="tabs"></nav>
    <main>
      <section id="dashboard" class="active"></section>
      <section id="teams"></section>
      <section id="rules"></section>
      <section id="conflicts"></section>
      <section id="schedule"></section>
      <section id="calendar"></section>
      <section id="partners"></section>
      <section id="exports"></section>
    </main>
  </div>

  <div id="modalBackdrop" class="modal-backdrop" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()" id="modal"></div>
  </div>

  <script>
    const DEFAULT_TEAMS = [
      { id: uid(), name: 'Fresno State', city: 'Fresno, CA', venue: 'Save Mart Center', color: '#c41230', partnerName: 'San Diego State' },
      { id: uid(), name: 'Washington State', city: 'Pullman, WA', venue: 'Bohler Gym', color: '#981e32', partnerName: 'Oregon State' },
      { id: uid(), name: 'Boise State', city: 'Boise, ID', venue: 'Bronco Gym', color: '#0033a0', partnerName: 'Utah State' },
      { id: uid(), name: 'Oregon State', city: 'Corvallis, OR', venue: 'Gill Coliseum', color: '#dc4405', partnerName: 'Washington State' },
      { id: uid(), name: 'San Diego State', city: 'San Diego, CA', venue: 'Aztec Court', color: '#a6192e', partnerName: 'Fresno State' },
      { id: uid(), name: 'Utah State', city: 'Logan, UT', venue: 'Wayne Estes Center', color: '#0f2439', partnerName: 'Boise State' },
      { id: uid(), name: 'Texas State', city: 'San Marcos, TX', venue: 'Strahan Arena', color: '#501214', partnerName: 'Colorado State' },
      { id: uid(), name: 'Colorado State', city: 'Fort Collins, CO', venue: 'Moby Arena', color: '#1e4d2b', partnerName: 'Texas State' },
      { id: uid(), name: 'Gonzaga', city: 'Spokane, WA', venue: 'Martin Centre', color: '#041e42', partnerName: '' }
    ];

    const DEFAULT_RULES = {
      sport: 'Women\'s Volleyball',
      startDate: '2026-09-24',
      endDate: '2026-11-21',
      roundRobin: 'single',
      allowedDays: ['Thu', 'Sat'],
      maxRoadStreak: 2,
      minRestDays: 1,
      allowBackToBack: false,
      targetGamesPerTeam: 8,
      prioritizePartners: true
    };

    let state = {
      teams: [],
      rules: { ...DEFAULT_RULES },
      conflicts: [],
      games: [],
      warnings: []
    };

    const tabList = [
      ['dashboard', 'Dashboard'], ['teams', 'Teams'], ['rules', 'Rules'], ['conflicts', 'Conflicts'],
      ['schedule', 'Schedule'], ['calendar', 'Calendar'], ['partners', 'Travel Partners'], ['exports', 'Exports']
    ];

    function uid() { return Math.random().toString(36).slice(2, 10); }
    function fmt(d) { return new Date(d + 'T12:00:00').toLocaleDateString(undefined, { month:'short', day:'numeric', weekday:'short' }); }
    function dayName(dateStr) { return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short' }); }
    function byId(id) { return document.getElementById(id); }
    function team(id) { return state.teams.find(t => t.id === id); }
    function teamByName(name) { return state.teams.find(t => t.name === name); }
    function teamLabel(id) { const t = team(id); return t ? t.name : 'Unknown'; }
    function teamDot(id) { const t = team(id); return `<span class="team-dot" style="background:${t?.color || '#999'}"></span>`; }

    function init() {
      renderTabs();
      loadState();
      render();
    }

    function hydrateDefault() {
      const teams = DEFAULT_TEAMS.map(t => ({ ...t, id: uid() }));
      teams.forEach(t => {
        const p = teams.find(x => x.name === t.partnerName);
        t.partnerId = p ? p.id : '';
        delete t.partnerName;
      });
      state.teams = teams;
      state.rules = { ...DEFAULT_RULES };
      state.games = [];
      state.warnings = [];
      const fresno = teamByName('Fresno State'), sdsu = teamByName('San Diego State'), gonzaga = teamByName('Gonzaga'), csu = teamByName('Colorado State');
      state.conflicts = [
        { id: uid(), scope: 'venue', teamId: fresno.id, date: '2026-10-03', title: 'Arena concert hold', type: 'Concert', notes: 'Save Mart Center unavailable.' },
        { id: uid(), scope: 'team', teamId: sdsu.id, date: '2026-10-10', title: 'Football home game staffing conflict', type: 'Other Sport', notes: 'Avoid home volleyball match.' },
        { id: uid(), scope: 'league', teamId: '', date: '2026-11-05', title: 'League-wide TV window hold', type: 'League', notes: 'No matches this date.' },
        { id: uid(), scope: 'venue', teamId: gonzaga.id, date: '2026-10-24', title: 'Campus event', type: 'Campus', notes: 'Venue conversion conflict.' },
        { id: uid(), scope: 'team', teamId: csu.id, date: '2026-10-17', title: 'Travel restriction', type: 'Travel', notes: 'Avoid away match.' }
      ];
    }

    function saveState() {
      localStorage.setItem('pac12_scheduler_state', JSON.stringify(state));
      toast('Saved to browser storage.');
    }

    function loadState(showToast=false) {
      const saved = localStorage.getItem('pac12_scheduler_state');
      if (saved) {
        try { state = JSON.parse(saved); if (showToast) toast('Loaded saved schedule.'); return render(); }
        catch(e) { console.warn(e); }
      }
      hydrateDefault();
    }

    function resetDemo() {
      if (!confirm('Reset to demo data? This clears saved teams, conflicts, and games.')) return;
      localStorage.removeItem('pac12_scheduler_state');
      hydrateDefault();
      saveState();
      render();
    }

    function renderTabs() {
      byId('tabs').innerHTML = tabList.map(([id, label]) => `<button class="${id==='dashboard'?'active':''}" onclick="showTab('${id}')">${label}</button>`).join('');
    }

    function showTab(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      byId(id).classList.add('active');
      [...document.querySelectorAll('nav button')].find(b => b.textContent === tabList.find(t => t[0]===id)[1]).classList.add('active');
      render();
    }

    function render() {
      renderDashboard(); renderTeams(); renderRules(); renderConflicts(); renderSchedule(); renderCalendar(); renderPartners(); renderExports();
    }

    function renderDashboard() {
      const games = state.games.length;
      const locked = state.games.filter(g => g.locked).length;
      const conflicts = state.conflicts.length;
      const unscheduled = state.games.filter(g => !g.date).length;
      byId('dashboard').innerHTML = `
        <div class="grid two">
          <div class="card">
            <h2>League Scheduling Hub</h2>
            <p class="muted">Generate, edit, lock, and export a conference schedule using conflict avoidance, travel partner logic, home/away balance, and rest rules.</p>
            <div class="toolbar">
              <button onclick="generateSchedule()">Auto-Generate Schedule</button>
              <button class="secondary" onclick="showTab('schedule')">Review Schedule</button>
              <button class="ghost" onclick="showTab('conflicts')">Manage Conflicts</button>
            </div>
            <div class="warnings">${warningHtml()}</div>
          </div>
          <div class="card grid two">
            <div class="stat"><span class="muted">Teams</span><strong>${state.teams.length}</strong></div>
            <div class="stat"><span class="muted">Games</span><strong>${games}</strong></div>
            <div class="stat"><span class="muted">Conflicts</span><strong>${conflicts}</strong></div>
            <div class="stat"><span class="muted">Locked / Unscheduled</span><strong>${locked} / ${unscheduled}</strong></div>
          </div>
        </div>
        <div class="card" style="margin-top:16px">
          <h3>Home / Away Balance</h3>
          ${balanceTable()}
        </div>`;
    }

    function warningHtml() {
      if (!state.warnings.length) return '<div class="warning">No current generator warnings. Conflicts will appear here after generation or manual edits.</div>';
      return state.warnings.map(w => `<div class="warning ${w.severity === 'bad' ? 'bad' : ''}">${w.message}</div>`).join('');
    }

    function renderTeams() {
      byId('teams').innerHTML = `<div class="card"><div class="toolbar"><button onclick="openTeamModal()">Add Team</button></div>${teamTable()}</div>`;
    }

    function teamTable() {
      return `<table><thead><tr><th>Team</th><th>City</th><th>Venue</th><th>Travel Partner</th><th>Actions</th></tr></thead><tbody>
        ${state.teams.map(t => `<tr><td>${teamDot(t.id)}<strong>${t.name}</strong></td><td>${t.city}</td><td>${t.venue}</td><td>${t.partnerId ? teamLabel(t.partnerId) : '<span class="pill warn">Solo / Bye Partner</span>'}</td><td><button class="small ghost" onclick="openTeamModal('${t.id}')">Edit</button> <button class="small bad" onclick="deleteTeam('${t.id}')">Delete</button></td></tr>`).join('')}
      </tbody></table>`;
    }

    function renderRules() {
      byId('rules').innerHTML = `<div class="card"><h2>Scheduling Rules</h2><div class="grid three">
        ${input('Sport', 'sport', state.rules.sport)}
        ${input('Start Date', 'startDate', state.rules.startDate, 'date')}
        ${input('End Date', 'endDate', state.rules.endDate, 'date')}
        ${select('Round Robin', 'roundRobin', state.rules.roundRobin, [['single','Single Round Robin'],['double','Double Round Robin']])}
        ${input('Target Games Per Team', 'targetGamesPerTeam', state.rules.targetGamesPerTeam, 'number')}
        ${input('Max Road Trips in a Row', 'maxRoadStreak', state.rules.maxRoadStreak, 'number')}
        ${input('Minimum Rest Days', 'minRestDays', state.rules.minRestDays, 'number')}
        ${select('Back-to-Back Days', 'allowBackToBack', String(state.rules.allowBackToBack), [['false','Do Not Allow'],['true','Allow']])}
        ${select('Prioritize Travel Partners', 'prioritizePartners', String(state.rules.prioritizePartners), [['true','Yes'],['false','No']])}
      </div>
      <label>Allowed Match Days</label>
      <div class="toolbar">${['Thu','Fri','Sat','Sun','Mon','Tue','Wed'].map(d => `<label class="pill"><input type="checkbox" style="width:auto" ${state.rules.allowedDays.includes(d) ? 'checked' : ''} onchange="toggleDay('${d}', this.checked)"> ${d}</label>`).join('')}</div>
      <div class="footer-actions"><button onclick="saveRules()">Save Rules</button><button class="secondary" onclick="generateSchedule()">Generate With These Rules</button></div></div>`;
    }

    function input(label, key, value, type='text') { return `<div><label>${label}</label><input id="rule_${key}" type="${type}" value="${escapeAttr(value)}"></div>`; }
    function select(label, key, value, opts) { return `<div><label>${label}</label><select id="rule_${key}">${opts.map(([v,l]) => `<option value="${v}" ${String(value)===String(v)?'selected':''}>${l}</option>`).join('')}</select></div>`; }
    function escapeAttr(v) { return String(v ?? '').replaceAll('"','&quot;'); }

    function toggleDay(d, checked) {
      if (checked && !state.rules.allowedDays.includes(d)) state.rules.allowedDays.push(d);
      if (!checked) state.rules.allowedDays = state.rules.allowedDays.filter(x => x !== d);
      saveState();
    }

    function saveRules() {
      const keys = ['sport','startDate','endDate','roundRobin','targetGamesPerTeam','maxRoadStreak','minRestDays','allowBackToBack','prioritizePartners'];
      keys.forEach(k => {
        const el = byId('rule_' + k);
        if (!el) return;
        let v = el.value;
        if (['targetGamesPerTeam','maxRoadStreak','minRestDays'].includes(k)) v = Number(v);
        if (['allowBackToBack','prioritizePartners'].includes(k)) v = v === 'true';
        state.rules[k] = v;
      });
      saveState(); render(); toast('Rules saved.');
    }

    function renderConflicts() {
      byId('conflicts').innerHTML = `<div class="card"><div class="toolbar"><button onclick="openConflictModal()">Add Conflict</button></div>
      <table><thead><tr><th>Date</th><th>Scope</th><th>Team/Venue</th><th>Type</th><th>Title</th><th>Actions</th></tr></thead><tbody>
        ${state.conflicts.sort((a,b)=>a.date.localeCompare(b.date)).map(c => `<tr><td>${fmt(c.date)}</td><td><span class="pill blue">${c.scope}</span></td><td>${c.teamId ? teamLabel(c.teamId) : 'League-wide'}</td><td>${c.type}</td><td><strong>${c.title}</strong><br><span class="muted">${c.notes || ''}</span></td><td><button class="small ghost" onclick="openConflictModal('${c.id}')">Edit</button> <button class="small bad" onclick="deleteConflict('${c.id}')">Delete</button></td></tr>`).join('')}
      </tbody></table></div>`;
    }

    function renderSchedule() {
      byId('schedule').innerHTML = `<div class="card"><div class="toolbar">
        <button onclick="generateSchedule()">Auto-Generate</button>
        <button class="ghost" onclick="openGameModal()">Add Game</button>
        <button class="secondary" onclick="validateSchedule(true)">Validate</button>
      </div><div class="warnings">${warningHtml()}</div>${scheduleTable()}</div>`;
    }

    function scheduleTable(games = state.games) {
      const sorted = [...games].sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
      return `<table><thead><tr><th>Date</th><th>Matchup</th><th>Venue</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${sorted.map(g => `<tr class="${g.locked?'locked':''}"><td>${g.date ? fmt(g.date) : '<span class="pill bad">Unscheduled</span>'}</td><td>${teamDot(g.homeId)}<strong>${teamLabel(g.homeId)}</strong> vs ${teamDot(g.awayId)}${teamLabel(g.awayId)}</td><td>${team(g.homeId)?.venue || ''}</td><td>${g.locked ? '<span class="pill warn">Locked</span>' : '<span class="pill good">Editable</span>'}</td><td><button class="small ghost" onclick="openGameModal('${g.id}')">Edit</button> <button class="small ${g.locked?'warn':'ghost'}" onclick="toggleLock('${g.id}')">${g.locked?'Unlock':'Lock'}</button> <button class="small bad" onclick="deleteGame('${g.id}')">Delete</button></td></tr>`).join('')}
      </tbody></table>`;
    }

    function renderCalendar() {
      const dates = allowedDates();
      byId('calendar').innerHTML = `<div class="card"><h2>League Calendar</h2><p class="muted">Click a game card to edit. Locked games show a lock icon.</p><div class="calendar">
        ${dates.map(d => `<div class="day"><strong>${fmt(d)}</strong>${state.games.filter(g=>g.date===d).map(g => `<div class="game-chip ${g.locked?'locked':''}" style="background:${team(g.homeId)?.color || '#111827'}" onclick="openGameModal('${g.id}')">${teamLabel(g.awayId)} at <strong>${teamLabel(g.homeId)}</strong></div>`).join('')}</div>`).join('')}
      </div></div>`;
    }

    function renderPartners() {
      const pairs = partnerPairs();
      byId('partners').innerHTML = `<div class="card"><h2>Travel Partner View</h2><div class="grid two">
        ${pairs.map(pair => `<div class="stat"><strong>${pair.map(t=>t.name).join(' + ')}</strong><span class="muted">${pair.length === 1 ? 'Solo / odd-team rotation partner needed' : 'Linked travel hosts'}</span><br>${partnerTripList(pair)}</div>`).join('')}
      </div></div>`;
    }

    function partnerTripList(pair) {
      const ids = pair.map(t => t.id);
      const hosted = state.games.filter(g => ids.includes(g.homeId)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      if (!hosted.length) return '<span class="muted">No hosted games yet.</span>';
      return hosted.slice(0,12).map(g => `<div style="margin-top:8px">${g.date ? fmt(g.date) : 'Unscheduled'}: ${teamLabel(g.awayId)} at ${teamLabel(g.homeId)}</div>`).join('');
    }

    function renderExports() {
      byId('exports').innerHTML = `<div class="card"><h2>Exports</h2><p class="muted">Export the current schedule or copy it for email, docs, or operations planning.</p><div class="toolbar">
        <button onclick="downloadCSV()">Export CSV</button>
        <button onclick="downloadHTML()">Download Full HTML App</button>
        <button onclick="copyScheduleText()">Copy Schedule Text</button>
        <button class="ghost" onclick="window.print()">Print / Save PDF</button>
      </div><textarea id="exportText" readonly>${plainSchedule()}</textarea></div>`;
    }

    function partnerPairs() {
      const seen = new Set(); const pairs = [];
      state.teams.forEach(t => {
        if (seen.has(t.id)) return;
        const p = t.partnerId ? team(t.partnerId) : null;
        if (p && !seen.has(p.id)) { pairs.push([t,p]); seen.add(t.id); seen.add(p.id); }
        else { pairs.push([t]); seen.add(t.id); }
      });
      return pairs;
    }

    function allowedDates() {
      const out = []; let d = new Date(state.rules.startDate + 'T12:00:00'); const end = new Date(state.rules.endDate + 'T12:00:00');
      while (d <= end) { const iso = d.toISOString().slice(0,10); if (state.rules.allowedDays.includes(dayName(iso))) out.push(iso); d.setDate(d.getDate()+1); }
      return out;
    }

    function generateSchedule() {
      saveRules();
      const locked = state.games.filter(g => g.locked);
      const warnings = [];
      const dates = allowedDates();
      if (!dates.length) warnings.push({ severity:'bad', message:'No allowed match dates exist between the selected start and end dates.' });

      const games = [...locked];
      const pairings = [];
      for (let i=0; i<state.teams.length; i++) {
        for (let j=i+1; j<state.teams.length; j++) {
          pairings.push({ a: state.teams[i].id, b: state.teams[j].id });
          if (state.rules.roundRobin === 'double') pairings.push({ a: state.teams[j].id, b: state.teams[i].id });
        }
      }

      const existingKey = new Set(locked.map(g => matchupKey(g.homeId, g.awayId, state.rules.roundRobin === 'single')));
      let homeCounts = Object.fromEntries(state.teams.map(t => [t.id, locked.filter(g=>g.homeId===t.id).length]));
      let awayCounts = Object.fromEntries(state.teams.map(t => [t.id, locked.filter(g=>g.awayId===t.id).length]));
      const lastPlayed = Object.fromEntries(state.teams.map(t => [t.id, null]));
      locked.forEach(g => { if (g.date) { lastPlayed[g.homeId] = g.date; lastPlayed[g.awayId] = g.date; }});

      for (const p of pairings) {
        const singleKey = matchupKey(p.a, p.b, state.rules.roundRobin === 'single');
        if (existingKey.has(singleKey)) continue;
        let homeId = homeCounts[p.a] <= homeCounts[p.b] ? p.a : p.b;
        let awayId = homeId === p.a ? p.b : p.a;
        const slot = findSlot(homeId, awayId, dates, games, lastPlayed);
        if (slot) {
          const g = { id: uid(), date: slot, homeId, awayId, locked: false, notes: '' };
          games.push(g);
          homeCounts[homeId]++; awayCounts[awayId]++; lastPlayed[homeId]=slot; lastPlayed[awayId]=slot;
          existingKey.add(singleKey);
        } else {
          games.push({ id: uid(), date: '', homeId, awayId, locked: false, notes: 'Could not place without conflicts/rest issues.' });
          warnings.push({ severity:'bad', message:`Could not schedule ${teamLabel(awayId)} at ${teamLabel(homeId)} without breaking conflict/rest rules.` });
        }
      }

      state.games = games;
      state.warnings = warnings;
      validateSchedule(false);
      saveState(); render(); toast('Schedule generated.');
    }

    function matchupKey(a,b,single) { return single ? [a,b].sort().join('-') : `${a}-${b}`; }

    function findSlot(homeId, awayId, dates, games, lastPlayed) {
      const homePartner = team(homeId)?.partnerId;
      const ranked = [...dates].sort((d1,d2) => {
        const s1 = partnerScore(d1, homeId, homePartner, games) - dateLoad(d1, games);
        const s2 = partnerScore(d2, homeId, homePartner, games) - dateLoad(d2, games);
        return s2 - s1;
      });
      for (const d of ranked) {
        if (games.some(g => g.date === d && [g.homeId,g.awayId].includes(homeId))) continue;
        if (games.some(g => g.date === d && [g.homeId,g.awayId].includes(awayId))) continue;
        if (hasConflict(homeId, d, 'home') || hasConflict(awayId, d, 'away')) continue;
        if (!restOk(homeId, d, games, lastPlayed) || !restOk(awayId, d, games, lastPlayed)) continue;
        return d;
      }
      return '';
    }

    function partnerScore(date, homeId, partnerId, games) {
      if (!state.rules.prioritizePartners || !partnerId) return 0;
      const partnerHosting = games.some(g => g.date === date && g.homeId === partnerId);
      return partnerHosting ? 8 : 0;
    }
    function dateLoad(date, games) { return games.filter(g => g.date === date).length; }

    function restOk(teamId, date, games, lastPlayed) {
      if (state.rules.allowBackToBack) return true;
      const min = Number(state.rules.minRestDays || 0);
      const all = games.filter(g => g.date && [g.homeId,g.awayId].includes(teamId)).map(g => g.date);
      if (lastPlayed[teamId]) all.push(lastPlayed[teamId]);
      return all.every(d => Math.abs((new Date(date)-new Date(d))/(1000*60*60*24)) > min);
    }

    function hasConflict(teamId, date, role) {
      return state.conflicts.some(c => {
        if (c.date !== date) return false;
        if (c.scope === 'league') return true;
        if (c.teamId !== teamId) return false;
        if (c.scope === 'venue' && role !== 'home') return false;
        return true;
      });
    }

    function validateSchedule(showToast) {
      const warnings = [];
      const byDateTeam = new Map();
      state.games.forEach(g => {
        if (!g.date) return;
        [g.homeId, g.awayId].forEach(tid => {
          const key = `${g.date}_${tid}`;
          if (byDateTeam.has(key)) warnings.push({ severity:'bad', message:`${teamLabel(tid)} has multiple games on ${fmt(g.date)}.` });
          byDateTeam.set(key, true);
        });
        if (hasConflict(g.homeId, g.date, 'home')) warnings.push({ severity:'bad', message:`Conflict: ${teamLabel(g.homeId)} cannot host on ${fmt(g.date)}.` });
        if (hasConflict(g.awayId, g.date, 'away')) warnings.push({ severity:'bad', message:`Conflict: ${teamLabel(g.awayId)} has a team/travel issue on ${fmt(g.date)}.` });
      });
      state.warnings = warnings;
      saveState(); render();
      if (showToast) toast(warnings.length ? 'Validation found warnings.' : 'Schedule looks clean.');
    }

    function balanceTable() {
      return `<table><thead><tr><th>Team</th><th>Home</th><th>Away</th><th>Total</th><th>Balance</th></tr></thead><tbody>
      ${state.teams.map(t => { const h=state.games.filter(g=>g.homeId===t.id).length; const a=state.games.filter(g=>g.awayId===t.id).length; const diff=h-a; return `<tr><td>${teamDot(t.id)}${t.name}</td><td>${h}</td><td>${a}</td><td>${h+a}</td><td><span class="pill ${Math.abs(diff)<=1?'good':'warn'}">${diff>0?'+':''}${diff}</span></td></tr>`; }).join('')}
      </tbody></table>`;
    }

    function openTeamModal(id='') {
      const t = id ? team(id) : { id:'', name:'', city:'', venue:'', color:'#111827', partnerId:'' };
      openModal(`<h2>${id?'Edit':'Add'} Team</h2><div class="row">
        <div><label>Name</label><input id="team_name" value="${escapeAttr(t.name)}"></div>
        <div><label>City</label><input id="team_city" value="${escapeAttr(t.city)}"></div>
        <div><label>Venue</label><input id="team_venue" value="${escapeAttr(t.venue)}"></div>
        <div><label>Color</label><input id="team_color" type="color" value="${t.color || '#111827'}"></div>
        <div><label>Travel Partner</label><select id="team_partner"><option value="">None / Solo</option>${state.teams.filter(x=>x.id!==id).map(x=>`<option value="${x.id}" ${x.id===t.partnerId?'selected':''}>${x.name}</option>`).join('')}</select></div>
      </div><div class="footer-actions"><button class="ghost" onclick="hideModal()">Cancel</button><button onclick="saveTeam('${id}')">Save Team</button></div>`);
    }

    function saveTeam(id) {
      const data = { name: byId('team_name').value, city: byId('team_city').value, venue: byId('team_venue').value, color: byId('team_color').value, partnerId: byId('team_partner').value };
      if (!data.name.trim()) return alert('Team name is required.');
      if (id) Object.assign(team(id), data); else state.teams.push({ id: uid(), ...data });
      if (data.partnerId) team(data.partnerId).partnerId = id || state.teams[state.teams.length-1].id;
      hideModal(); saveState(); render();
    }

    function deleteTeam(id) {
      if (!confirm('Delete this team and related games/conflicts?')) return;
      state.teams = state.teams.filter(t => t.id !== id).map(t => ({...t, partnerId: t.partnerId === id ? '' : t.partnerId}));
      state.games = state.games.filter(g => g.homeId !== id && g.awayId !== id);
      state.conflicts = state.conflicts.filter(c => c.teamId !== id);
      saveState(); render();
    }

    function openConflictModal(id='') {
      const c = id ? state.conflicts.find(x=>x.id===id) : { id:'', scope:'venue', teamId:'', date:state.rules.startDate, title:'', type:'Venue', notes:'' };
      openModal(`<h2>${id?'Edit':'Add'} Conflict</h2><div class="row">
        <div><label>Date</label><input id="conflict_date" type="date" value="${c.date}"></div>
        <div><label>Scope</label><select id="conflict_scope"><option ${c.scope==='league'?'selected':''} value="league">League-wide</option><option ${c.scope==='team'?'selected':''} value="team">Team</option><option ${c.scope==='venue'?'selected':''} value="venue">Venue/Home</option></select></div>
        <div><label>Team / Venue</label><select id="conflict_team"><option value="">League-wide</option>${state.teams.map(t=>`<option value="${t.id}" ${t.id===c.teamId?'selected':''}>${t.name}</option>`).join('')}</select></div>
        <div><label>Type</label><input id="conflict_type" value="${escapeAttr(c.type)}"></div>
        <div style="grid-column:1/-1"><label>Title</label><input id="conflict_title" value="${escapeAttr(c.title)}"></div>
        <div style="grid-column:1/-1"><label>Notes</label><textarea id="conflict_notes">${c.notes || ''}</textarea></div>
      </div><div class="footer-actions"><button class="ghost" onclick="hideModal()">Cancel</button><button onclick="saveConflict('${id}')">Save Conflict</button></div>`);
    }

    function saveConflict(id) {
      const data = { date: byId('conflict_date').value, scope: byId('conflict_scope').value, teamId: byId('conflict_team').value, type: byId('conflict_type').value, title: byId('conflict_title').value, notes: byId('conflict_notes').value };
      if (data.scope !== 'league' && !data.teamId) return alert('Choose a team for team or venue conflicts.');
      if (data.scope === 'league') data.teamId = '';
      if (id) Object.assign(state.conflicts.find(c=>c.id===id), data); else state.conflicts.push({ id: uid(), ...data });
      hideModal(); saveState(); render();
    }
    function deleteConflict(id) { state.conflicts = state.conflicts.filter(c=>c.id!==id); saveState(); render(); }

    function openGameModal(id='') {
      const g = id ? state.games.find(x=>x.id===id) : { id:'', date:'', homeId:state.teams[0]?.id, awayId:state.teams[1]?.id, locked:false, notes:'' };
      openModal(`<h2>${id?'Edit':'Add'} Game</h2><div class="row">
        <div><label>Date</label><input id="game_date" type="date" value="${g.date || ''}"></div>
        <div><label>Locked</label><select id="game_locked"><option value="false" ${!g.locked?'selected':''}>No</option><option value="true" ${g.locked?'selected':''}>Yes</option></select></div>
        <div><label>Home</label><select id="game_home">${state.teams.map(t=>`<option value="${t.id}" ${t.id===g.homeId?'selected':''}>${t.name}</option>`).join('')}</select></div>
        <div><label>Away</label><select id="game_away">${state.teams.map(t=>`<option value="${t.id}" ${t.id===g.awayId?'selected':''}>${t.name}</option>`).join('')}</select></div>
        <div style="grid-column:1/-1"><label>Notes</label><textarea id="game_notes">${g.notes || ''}</textarea></div>
      </div><div id="gameCheck" class="warnings" style="margin-top:12px"></div><div class="footer-actions"><button class="ghost" onclick="hideModal()">Cancel</button><button onclick="saveGame('${id}')">Save Game</button></div>`);
    }

    function saveGame(id) {
      const data = { date: byId('game_date').value, homeId: byId('game_home').value, awayId: byId('game_away').value, locked: byId('game_locked').value === 'true', notes: byId('game_notes').value };
      if (data.homeId === data.awayId) return alert('Home and away teams must be different.');
      const localWarnings = [];
      if (data.date && hasConflict(data.homeId, data.date, 'home')) localWarnings.push(`${teamLabel(data.homeId)} has a home/venue conflict on this date.`);
      if (data.date && hasConflict(data.awayId, data.date, 'away')) localWarnings.push(`${teamLabel(data.awayId)} has a team/travel conflict on this date.`);
      if (localWarnings.length && !confirm('Warning:\n' + localWarnings.join('\n') + '\n\nSave anyway?')) return;
      if (id) Object.assign(state.games.find(g=>g.id===id), data); else state.games.push({ id: uid(), ...data });
      hideModal(); validateSchedule(false); saveState(); render();
    }
    function toggleLock(id) { const g = state.games.find(g=>g.id===id); g.locked = !g.locked; saveState(); render(); }
    function deleteGame(id) { state.games = state.games.filter(g=>g.id!==id); saveState(); render(); }

    function downloadCSV() {
      const rows = [['Date','Home','Away','Venue','Locked','Notes'], ...state.games.map(g => [g.date, teamLabel(g.homeId), teamLabel(g.awayId), team(g.homeId)?.venue || '', g.locked ? 'Yes':'No', g.notes || ''])];
      const csv = rows.map(r => r.map(v => `"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');
      downloadBlob(csv, 'pac12_schedule.csv', 'text/csv');
    }
    function downloadHTML() { downloadBlob(document.documentElement.outerHTML, 'pac12_conference_scheduler.html', 'text/html'); }
    function copyScheduleText() { navigator.clipboard.writeText(plainSchedule()); toast('Schedule copied.'); }
    function plainSchedule() { return state.games.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999')).map(g => `${g.date || 'Unscheduled'} - ${teamLabel(g.awayId)} at ${teamLabel(g.homeId)}${g.locked ? ' [LOCKED]' : ''}`).join('\n'); }
    function downloadBlob(content, filename, type) { const blob = new Blob([content], {type}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href); }

    function openModal(html) { byId('modal').innerHTML = html; byId('modalBackdrop').classList.add('open'); }
    function hideModal() { byId('modalBackdrop').classList.remove('open'); }
    function closeModal(e) { if (e.target.id === 'modalBackdrop') hideModal(); }
    function toast(msg) { const el = document.createElement('div'); el.textContent = msg; el.style.cssText = 'position:fixed;right:18px;bottom:18px;background:#111827;color:white;padding:12px 16px;border-radius:999px;z-index:100;box-shadow:0 16px 40px rgba(0,0,0,.2);font-weight:800'; document.body.appendChild(el); setTimeout(()=>el.remove(), 2200); }

    init();
  </script>
</body>
</html>
